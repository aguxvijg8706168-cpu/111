<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>WordFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
font-family:
Inter,
system-ui;
background:
linear-gradient(
135deg,
#eef4ff,
#f7fbff
);
transition:.35s;
}

.dark{
background:
linear-gradient(
135deg,
#0f172a,
#111827
);
color:#fff;
}

.glass{
backdrop-filter:blur(18px);
background:
rgba(255,255,255,.68);
border:1px solid rgba(255,255,255,.35);
box-shadow:
0 8px 40px rgba(0,0,0,.08);
}

.dark .glass{
background:
rgba(255,255,255,.08);
}

.card{
height:260px;
perspective:1000px;
}

.inner{
position:relative;
width:100%;
height:100%;
transition:.55s;
transform-style:preserve-3d;
}

.flip{
transform:rotateY(180deg);
}

.face{
position:absolute;
inset:0;
border-radius:26px;
backface-visibility:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:24px;
}

.back{
transform:rotateY(180deg);
}

button{
transition:.2s;
}

button:active{
transform:scale(.95);
}

.tag{
padding:4px 12px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

</style>
</head>

<body>

<main class="max-w-3xl mx-auto p-4">

<div class="glass rounded-3xl p-5 mb-5">

<div
class="flex justify-between items-center">

<h1
class="text-2xl font-bold">
📘 WordFlow
</h1>

<button
id="themeBtn"
class="rounded-xl px-4 py-2 bg-black text-white">
🌙
</button>

</div>

<div
class="grid
grid-cols-2
md:grid-cols-4
gap-3
mt-4">

<select
id="categorySelect"
class="rounded-xl p-3 border">

<option value="cet4">
四级
</option>

<option value="cet6">
六级
</option>

<option value="ielts">
雅思
</option>

<option value="toefl">
托福
</option>

<option value="kaoyan">
考研
</option>

</select>

<input
id="searchInput"
placeholder="搜索单词"
class="rounded-xl p-3 border">

<button
id="shuffleBtn"
class="rounded-xl p-3 bg-blue-500 text-white">
🎲 随机
</button>

<button
id="testBtn"
class="rounded-xl p-3 bg-purple-500 text-white">
📝 拼写
</button>

</div>

<div
class="grid
grid-cols-4
gap-3
mt-3">

<button
id="favBtn"
class="rounded-xl p-3 bg-yellow-400">
⭐ 收藏
</button>

<button
id="wrongBtn"
class="rounded-xl p-3 bg-red-500 text-white">
❌ 错词
</button>

<button
id="clearFavBtn"
class="rounded-xl p-3 bg-orange-500 text-white">
🗑⭐
</button>

<button
id="clearWrongBtn"
class="rounded-xl p-3 bg-red-700 text-white">
🗑❌
</button>

</div>

</div>

<div
id="stats"
class="mb-4 text-center">
</div>

<div
class="card"
id="cardBox">

<div
class="inner"
id="cardInner">

<div
class="face glass">

<div
id="statusTag"
class="tag bg-blue-500 text-white mb-3">
今日
</div>

<div
id="wordText"
class="text-4xl font-bold mb-2">
</div>

<div
id="phonetic"
class="text-gray-500">
</div>

</div>

<div
class="face back glass">

<div
id="transText"
class="text-xl">
</div>

</div>

</div>

</div>

</main>

<div
id="testModal"
class="hidden fixed inset-0
bg-black/40
flex items-center justify-center">

<div
class="glass rounded-3xl p-8 w-[92%] max-w-md">

<div
class="text-xl font-bold mb-4">
拼写测试
</div>

<div
id="testMeaning"
class="mb-4 text-lg">
</div>

<input
id="testInput"
class="w-full rounded-xl p-3 border"
placeholder="输入英文">

<div
id="testResult"
class="mt-4">
</div>

<div
class="flex gap-3 mt-5">

<button
id="checkBtn"
class="px-4 py-2 bg-blue-500 text-white rounded-xl">
检查
</button>

<button
id="closeTestBtn"
class="px-4 py-2 bg-gray-500 text-white rounded-xl">
关闭
</button>

</div>

</div>

</div>

<script>

let words=[];
let filtered=[];
let current=0;
let testWord=null;

let favorites=
JSON.parse(
localStorage.getItem("favorites")||"[]"
);

let wrongWords=
JSON.parse(
localStorage.getItem("wrongWords")||"[]"
);

const categorySelect=
document.getElementById(
"categorySelect"
);

const searchInput=
document.getElementById(
"searchInput"
);

function wordText(w){

return w.word||w.name||"";

}

function transText(w){

return
w.trans||
w.meaning||
w.translation||
"";

}

function phoneText(w){

return
w.phonetic||
w.usphone||
w.ukphone||
"";

}

async function loadWords(){

let file=
`date/${categorySelect.value}.json`;

let res=
await fetch(file);

words=
await res.json();

filtered=[...words];

current=0;

render();

}

function render(){

if(!filtered.length)return;

let w=
filtered[current];

document
.getElementById(
"wordText"
)
.innerText=
wordText(w);

document
.getElementById(
"transText"
)
.innerText=
transText(w);

document
.getElementById(
"phonetic"
)
.innerText=
phoneText(w);

let tag="今日";

if(
favorites.includes(
wordText(w)
)
){
tag="熟练";
}

if(
wrongWords.includes(
wordText(w)
)
){
tag="复习";
}

document
.getElementById(
"statusTag"
)
.innerText=tag;

updateStats();

}

function updateStats(){

document
.getElementById(
"stats"
)
.innerHTML=

`总数：${words.length}
｜
收藏：${favorites.length}
｜
错词：${wrongWords.length}`;

}

document
.getElementById(
"cardBox"
)
.onclick=()=>{

document
.getElementById(
"cardInner"
)
.classList.toggle(
"flip"
);

};

document
.getElementById(
"shuffleBtn"
)
.onclick=()=>{

current=
Math.floor(
Math.random()
*filtered.length
);

render();

};

document
.getElementById(
"favBtn"
)
.onclick=()=>{

let w=
wordText(
filtered[current]
);

if(
!favorites.includes(w)
){
favorites.push(w);
}

localStorage.setItem(
"favorites",
JSON.stringify(
favorites
)
);

render();

};

document
.getElementById(
"wrongBtn"
)
.onclick=()=>{

let w=
wordText(
filtered[current]
);

if(
!wrongWords.includes(w)
){
wrongWords.push(w);
}

localStorage.setItem(
"wrongWords",
JSON.stringify(
wrongWords
)
);

render();

};

document
.getElementById(
"clearFavBtn"
)
.onclick=()=>{

favorites=[];

localStorage.setItem(
"favorites",
"[]"
);

render();

};

document
.getElementById(
"clearWrongBtn"
)
.onclick=()=>{

wrongWords=[];

localStorage.setItem(
"wrongWords",
"[]"
);

render();

};

function applyFilter(){

let q=
searchInput.value
.trim()
.toLowerCase();

filtered=
words.filter(w=>

wordText(w)
.toLowerCase()
.includes(q)

||

transText(w)
.includes(q)

);

current=0;

render();

}

searchInput
.addEventListener(
"keydown",
e=>{

if(
e.key==="Enter"
){

applyFilter();

}

}
);

categorySelect
.onchange=
loadWords;

document
.getElementById(
"themeBtn"
)
.onclick=()=>{

document.body
.classList.toggle(
"dark"
);

};

document
.getElementById(
"testBtn"
)
.onclick=()=>{

testWord=
words[
Math.floor(
Math.random()
*words.length
)
];

document
.getElementById(
"testMeaning"
)
.innerText=
transText(testWord);

document
.getElementById(
"testInput"
)
.value="";

document
.getElementById(
"testResult"
)
.innerText="";

document
.getElementById(
"testModal"
)
.classList.remove(
"hidden"
);

};

document
.getElementById(
"closeTestBtn"
)
.onclick=()=>{

document
.getElementById(
"testModal"
)
.classList.add(
"hidden"
);

};

document
.getElementById(
"checkBtn"
)
.onclick=()=>{

let v=
document
.getElementById(
"testInput"
)
.value
.trim()
.toLowerCase();

let word=
wordText(
testWord
).toLowerCase();

if(v===word){

document
.getElementById(
"testResult"
)
.innerHTML=
"✅ 正确";

}else{

document
.getElementById(
"testResult"
)
.innerHTML=
`❌ 正确答案：${word}`;

if(
!wrongWords.includes(word)
){
wrongWords.push(word);

localStorage.setItem(
"wrongWords",
JSON.stringify(
wrongWords
)
);

}

}

updateStats();

};

loadWords();

</script>

</body>
</html>
