<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闪卡词汇 - 优雅的背单词工坊</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f8fafc;
            --card-front: #ffffff;
            --card-back: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --favorite-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 顶部导航与选择区 */
        .header-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .select-wrapper {
            position: relative;
        }

        select {
            appearance: none;
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 8px 32px 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-main);
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        /* 核心卡片容器（3D翻转舞台） */
        .card-stage {
            perspective: 1000px;
            height: 280px;
            width: 100%;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            border-radius: 24px;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: var(--card-front);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        /* 卡片正面 */
        .card-front {
            background: #ffffff;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .index-indicator {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .action-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-icon-btn:hover {
            background: #f1f5f9;
        }

        .word-body {
            text-align: center;
            margin: auto 0;
        }

        .word-text {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .word-phonetic {
            font-family: "Lucida Sans Unicode", sans-serif;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .card-footer-tip {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.7;
        }

        /* 卡片背面 */
        .card-back {
            background: linear-gradient(135deg, #f8fafc 0%, #edf2f7 100%);
            transform: rotateY(180deg);
        }

        .translation-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 6px;
        }

        .translation-body {
            margin: auto 0;
        }

        .word-trans {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .word-example {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
            font-style: italic;
        }

        /* 控制按钮区 */
        .control-panel {
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }

        .btn {
            flex: 1;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 14px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #ffffff;
            border: none;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: transparent;
        }

        /* SVG 图标基础样式 */
        .icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .icon-star.is-active {
            fill: var(--favorite-color);
            stroke: var(--favorite-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-panel">
            <div class="brand-title">闪卡词汇 ✨</div>
            <div class="select-wrapper">
                <select id="levelSelect">
                    <option value="primary">🎒 小学生</option>
                    <option value="junior">🏫 初中生</option>
                    <option value="senior">🎓 高中生</option>
                    <option value="cet4">📘 英语四级</option>
                    <option value="cet6">📕 英语六级</option>
                    <option value="fav">⭐ 我的收藏</option>
                </select>
            </div>
        </div>

        <div class="card-stage" id="cardStage">
            <div class="card" id="vocabularyCard">
                <div class="card-face card-front">
                    <div class="card-header">
                        <span class="index-indicator" id="indexIndicator">0 / 0</span>
                        <div style="display: flex; gap: 8px;">
                            <button class="action-icon-btn" id="audioBtn" title="朗读">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke-width="1.5"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke-width="1.5"></path></svg>
                            </button>
                            <button class="action-icon-btn" id="favBtn" title="收藏">
                                <svg class="icon icon-star" id="starIcon" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            </button>
                        </div>
                    </div>
                    <div class="word-body">
                        <div class="word-text" id="wordText">Loading</div>
                        <div class="word-phonetic" id="wordPhonetic">/--/</div>
                    </div>
                    <div class="card-footer-tip">💡 点击卡片翻转查看中文释义</div>
                </div>

                <div class="card-face card-back">
                    <div class="translation-title">释义与例句</div>
                    <div class="translation-body">
                        <div class="word-trans" id="wordTrans">加载中...</div>
                        <div class="word-example" id="wordExample">Loading example sentence.</div>
                    </div>
                    <div class="card-footer-tip">💡 点击卡片返回正面</div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <button class="btn" id="prevBtn">
                <svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                上一个
            </button>
            <button class="btn btn-primary" id="nextBtn">
                下一个
                <svg class="icon" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
    </div>

    <script>
        // 1. 扩充的内置单词库（每个级别提供一些演示单词）
        const dictionary = {
            primary: [
                { word: "apple", phonetic: "[ˈæpl]", trans: "n. 苹果", example: "I eat an apple every morning." },
                { word: "banana", phonetic: "[bəˈnɑːnə]", trans: "n. 香蕉", example: "Bananas are rich in potassium." },
                { word: "cat", phonetic: "[kæt]", trans: "n. 猫", example: "The cat is sleeping on the sofa." },
                { word: "dog", phonetic: "[dɒɡ]", trans: "n. 狗", example: "A dog is a man's best friend." }
            ],
            junior: [
                { word: "beautiful", phonetic: "[ˈbjuːtɪfl]", trans: "adj. 美丽的，漂亮的", example: "What a beautiful sunset!" },
                { word: "determine", phonetic: "[dɪˈtɜːmɪn]", trans: "v. 决定；下决心", example: "She determined to study harder." },
                { word: "exercise", phonetic: "[ˈeksəsaɪz]", trans: "n./v. 锻炼；练习", example: "Swimming is excellent exercise." }
            ],
            senior: [
                { word: "abandon", phonetic: "[əˈbændən]", trans: "vt. 放弃，抛弃", example: "Never abandon your dreams." },
                { word: "brilliant", phonetic: "[ˈbrɪliənt]", trans: "adj. 极好的；聪明的", example: "He came up with a brilliant idea." },
                { word: "challenge", phonetic: "[ˈtʃælɪndʒ]", trans: "n./v. 挑战", example: "We must face the challenge bravely." }
            ],
            cet4: [
                { word: "emphasize", phonetic: "[ˈemfəsaɪz]", trans: "vt. 强调，着重", example: "My teacher emphasized the importance of grammar." },
                { word: "negotiate", phonetic: "[nɪˈɡəʊʃieɪt]", trans: "v. 谈判，协商", example: "They managed to negotiate a new contract." },
                { word: "standard", phonetic: "[ˈstændəd]", trans: "n. 标准 adj. 标准的", example: "This product meets international standards." }
            ],
            cet6: [
                { word: "ambiguous", phonetic: "[æmˈbɪɡjuəs]", trans: "adj. 模棱两可的，模糊的", example: "His reply was ambiguous and unclear." },
                { word: "scrutineer", phonetic: "[ˌskruːtəˈnɪə(r)]", trans: "n. 监票人；审查员", example: "The scrutineers are counting the votes." },
                { word: "aggregate", phonetic: "[ˈæɡrɪɡət]", trans: "n. 总数 v. 总计", example: "The aggregate score was 4-3." }
            ]
        };

        // 2. 核心状态管理变量
        let currentLevel = 'primary'; 
        let currentIndex = 0;
        let currentWords = [...dictionary[currentLevel]]; 
        let favorites = JSON.parse(localStorage.getItem('word_favorites')) || [];

        // 3. DOM 节点获取
        const levelSelect = document.getElementById('levelSelect');
        const cardStage = document.getElementById('cardStage');
        const vocabularyCard = document.getElementById('vocabularyCard');
        const wordText = document.getElementById('wordText');
        const wordPhonetic = document.getElementById('wordPhonetic');
        const wordTrans = document.getElementById('wordTrans');
        const wordExample = document.getElementById('wordExample');
        const indexIndicator = document.getElementById('indexIndicator');
        const starIcon = document.getElementById('starIcon');
        
        const audioBtn = document.getElementById('audioBtn');
        const favBtn = document.getElementById('favBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // 4. 初始化应用
        function init() {
            updateWordList();
            renderCard();
            
            // 绑定事件
            levelSelect.addEventListener('change', handleLevelChange);
            cardStage.addEventListener('click', toggleFlip);
            prevBtn.addEventListener('click', (e) => { e.stopPropagation(); moveCard(-1); });
            nextBtn.addEventListener('click', (e) => { e.stopPropagation(); moveCard(1); });
            audioBtn.addEventListener('click', (e) => { e.stopPropagation(); speakWord(); });
            favBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(); });
        }

        // 5. 更新当前的单词数据流
        function updateWordList() {
            currentLevel = levelSelect.value;
            if (currentLevel === 'fav') {
                currentWords = favorites;
            } else {
                currentWords = [...dictionary[currentLevel]];
            }
            currentIndex = 0;
        }

        // 6. 渲染单词卡片内容与状态
        function renderCard() {
            // 首先将卡片恢复到正面
            vocabularyCard.classList.remove('is-flipped');

            // 如果当前词库为空（特别是“我的收藏”清空时）
            if (currentWords.length === 0) {
                wordText.innerText = "空空如也";
                wordPhonetic.innerText = "/--/";
                wordTrans.innerText = "还没有收藏任何单词哦";
                wordExample.innerText = "在其他级别点击右上角的星星即可收藏。";
                indexIndicator.innerText = "0 / 0";
                starIcon.classList.remove('is-active');
                return;
            }

            const currentData = currentWords[currentIndex];
            
            // 延时一点点填入数据，防止翻转过程中穿帮
            setTimeout(() => {
                wordText.innerText = currentData.word;
                wordPhonetic.innerText = currentData.phonetic;
                wordTrans.innerText = currentData.trans;
                wordExample.innerText = currentData.example || "";
                indexIndicator.innerText = `${currentIndex + 1} / ${currentWords.length}`;
            }, 150);

            // 检查当前单词是否处于收藏状态
            const isFav = favorites.some(item => item.word === currentData.word);
            if (isFav) {
                starIcon.classList.add('is-active');
            } else {
                starIcon.classList.remove('is-active');
            }
        }

        // 7. 功能：卡片正反面翻转
        function toggleFlip() {
            if (currentWords.length === 0) return;
            vocabularyCard.classList.toggle('is-flipped');
        }

        // 8. 功能：上一个/下一个 单词切换
        function moveCard(step) {
            if (currentWords.length <= 1) return;
            currentIndex += step;
            
            // 循环轮播逻辑
            if (currentIndex < 0) {
                currentIndex = currentWords.length - 1;
            } else if (currentIndex >= currentWords.length) {
                currentIndex = 0;
            }
            renderCard();
        }

        // 9. 功能：切换级别/学段
        function handleLevelChange() {
            updateWordList();
            renderCard();
        }

        // 10. 功能：Web Speech API 核心语音发音
        function speakWord() {
            if (currentWords.length === 0) return;
            const textToSpeak = currentWords[currentIndex].word;
            
            // 实例化发音对象
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'en-US'; // 设置为美式英语
            utterance.rate = 0.85;    // 语速稍慢，方便学习

            // 先停止当前可能正在朗读的语音，再播放新的
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        // 11. 功能：添加/取消 收藏（持久化存储到本地）
        function toggleFavorite() {
            if (currentWords.length === 0) return;
            const currentData = currentWords[currentIndex];
            const foundIndex = favorites.findIndex(item => item.word === currentData.word);

            if (foundIndex > -1) {
                // 如果已经收藏了，那就移除它
                favorites.splice(foundIndex, 1);
                starIcon.classList.remove('is-active');
            } else {
                // 如果没收藏，加进去
                favorites.push(currentData);
                starIcon.classList.add('is-active');
            }

            // 同步回本地磁盘
            localStorage.setItem('word_favorites', JSON.stringify(favorites));

            // 特殊处理：如果用户正在“我的收藏”分类下进行取消收藏，需要刷新列表
            if (currentLevel === 'fav') {
                currentWords = favorites;
                if (currentIndex >= currentWords.length && currentIndex > 0) {
                    currentIndex--;
                }
                renderCard();
            }
        }

        // 执行初始化
        init();
    </script>
</body>
</html>
