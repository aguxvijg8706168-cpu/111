<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>英语单词学习</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
body{
transition:.3s;
}

.word-card{
transition:.25s;
}

.word-card:hover{
transform:translateY(-5px);
}

.dark-mode{
background:#111827;
color:#fff;
}

.dark-mode .word-card{
background:#1f2937;
color:#fff;
}

.hide-cn .cn{
display:none;
}
</style>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- 顶部 -->
<header class="bg-white shadow sticky top-0 z-50">
<div class="max-w-7xl mx-auto p-4 flex flex-wrap gap-3 items-center">

<h1 class="text-2xl font-bold text-blue-600">
英语单词学习
</h1>

<select id="levelSelect"
class="border rounded px-3 py-2">

<option value="junior">初中</option>
<option value="senior">高中</option>
<option value="cet4">四级</option>
<option value="cet6">六级</option>
<option value="kaoyan">考研</option>

</select>

<input id="searchInput"
placeholder="搜索英文 / 中文"
class="border rounded px-3 py-2 flex-1"/>

<button id="shuffleBtn"
class="bg-blue-500 text-white px-3 py-2 rounded">
<i class="fa-solid fa-shuffle"></i>
</button>

<button id="toggleCnBtn"
class="bg-green-500 text-white px-3 py-2 rounded">
中文
</button>

<button id="darkBtn"
class="bg-gray-800 text-white px-3 py-2 rounded">
<i class="fa-solid fa-moon"></i>
</button>

<button id="favOnlyBtn"
class="bg-yellow-500 text-white px-3 py-2 rounded">
收藏
</button>

</div>
</header>

<!-- 主体 -->
<main class="max-w-7xl mx-auto p-4">

<div id="countInfo"
class="mb-4 text-gray-500"></div>

<div id="wordList"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
</div>

</main>

<script>

const files={

junior:"./date/1-junior-顺序.json",
senior:"./date/2-senior-顺序.json",
cet4:"./date/3-CET4-顺序.json",
cet6:"./date/4-CET6-顺序.json",
kaoyan:"./date/5-考研-顺序.json"

};

let words=[];
let filtered=[];

let favorites=
JSON.parse(localStorage.getItem("favorites")||"[]");

let currentLevel=
localStorage.getItem("level")||"junior";

let favOnly=false;

const levelSelect=
document.getElementById("levelSelect");

const searchInput=
document.getElementById("searchInput");

levelSelect.value=currentLevel;

async function loadWords(){

let file=files[levelSelect.value];

localStorage.setItem(
"level",
levelSelect.value
);

let res=await fetch(file);

words=await res.json();

filtered=[...words];

render();

}

function render(){

let list=document.getElementById("wordList");

let kw=
searchInput.value.trim().toLowerCase();

let arr=filtered.filter(w=>{

let en=
(w.word||"").toLowerCase();

let cn=
JSON.stringify(w).toLowerCase();

let ok=
en.includes(kw)||
cn.includes(kw);

if(favOnly){

return ok&&favorites.includes(w.word);

}

return ok;

});

document.getElementById(
"countInfo"
).innerText=
`共 ${arr.length} 个单词`;

list.innerHTML="";

arr.forEach(w=>{

let trans="";

if(w.translations){

trans=
w.translations
.map(t=>t.translation)
.join("；");

}

let phrases="";

if(w.phrases){

phrases=
w.phrases
.slice(0,2)
.map(p=>
`<div class="text-sm text-gray-500">
${p.phrase} — ${p.translation}
</div>`
).join("");

}

let fav=
favorites.includes(w.word);

let card=document.createElement("div");

card.className=
"word-card bg-white rounded-xl shadow p-5";

card.innerHTML=`

<div class="flex justify-between">

<div class="text-xl font-bold">
${w.word}
</div>

<div class="flex gap-3">

<i class="fa-solid fa-volume-high
cursor-pointer text-blue-500"></i>

<i class="fa-star
cursor-pointer
${fav?
"text-yellow-400 fa-solid":
"fa-regular text-gray-400"}"></i>

</div>

</div>

<div class="cn mt-3 text-gray-700">
${trans}
</div>

<div class="mt-3">
${phrases}
</div>

`;

let volume=
card.querySelector(".fa-volume-high");

volume.onclick=()=>{

speechSynthesis.cancel();

let text=
`${w.word} ${trans}`;

let u=
new SpeechSynthesisUtterance(text);

u.lang="en-US";

speechSynthesis.speak(u);

};

let star=
card.querySelector(".fa-star");

star.onclick=()=>{

if(favorites.includes(w.word)){

favorites=
favorites.filter(
x=>x!==w.word
);

}else{

favorites.push(w.word);

}

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
);

render();

};

list.appendChild(card);

});

}

levelSelect.onchange=loadWords;

searchInput.oninput=render;

document
.getElementById("shuffleBtn")
.onclick=()=>{

filtered.sort(
()=>Math.random()-.5
);

render();

};

document
.getElementById("toggleCnBtn")
.onclick=()=>{

document.body
.classList.toggle("hide-cn");

};

document
.getElementById("darkBtn")
.onclick=()=>{

document.body
.classList.toggle("dark-mode");

};

document
.getElementById("favOnlyBtn")
.onclick=()=>{

favOnly=!favOnly;

render();

};

loadWords();

</script>

</body>
</html>
