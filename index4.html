<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>WordFlow AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
font-family:
Inter,
system-ui;
background:
linear-gradient(
135deg,
#eef4ff,
#f8fbff
);
color:#111827;
}

.dark{
background:
linear-gradient(
135deg,
#0f172a,
#111827
);
color:#fff;
}

.glass{
backdrop-filter:blur(18px);
background:
rgba(255,255,255,.72);
border:1px solid rgba(255,255,255,.35);
box-shadow:
0 12px 36px rgba(0,0,0,.08);
}

.dark .glass{
background:
rgba(255,255,255,.08);
}

.section{
display:none;
padding-bottom:100px;
}

.show{
display:block;
}

.bottom-nav{
position:fixed;
left:0;
right:0;
bottom:0;
padding:10px;
display:grid;
grid-template-columns:
repeat(5,1fr);
gap:8px;
background:
rgba(255,255,255,.86);
backdrop-filter:blur(18px);
}

.dark .bottom-nav{
background:
rgba(15,23,42,.9);
}

.tab{
padding:12px;
border-radius:18px;
text-align:center;
font-weight:700;
cursor:pointer;
}

.active{
background:#2563eb;
color:white;
}

.card{
transition:.25s;
}

.card:hover{
transform:translateY(-2px);
}

textarea{
resize:none;
}

</style>
</head>

<body>

<main class="max-w-4xl mx-auto p-4">

<div
class="glass rounded-3xl p-5 mb-5">

<div
class="flex justify-between items-center">

<h1
class="text-2xl font-bold">
📘 WordFlow AI
</h1>

<button
id="themeBtn"
class="rounded-xl px-4 py-2 bg-black text-white">
🌙
</button>

</div>

<div
id="stats"
class="mt-4 text-sm">
学习统计加载中...
</div>

</div>

<!-- 首页 -->

<section
id="home"
class="section show">

<div
class="grid md:grid-cols-2 gap-4">

<div class="glass rounded-3xl p-5">
🎯 今日目标

<div class="mt-4">
新词 40
</div>

<div>
复习 26
</div>

<div>
错词
<span id="wrongCount"></span>
</div>

</div>

<div class="glass rounded-3xl p-5">
🧠 AI词汇量测试

<button
onclick="startTest()"
class="w-full mt-4 p-3 rounded-2xl bg-purple-500 text-white">
开始测试
</button>

</div>

<div class="glass rounded-3xl p-5">
📰 AI短文

<div
id="articleBox"
class="mt-4 text-sm">
点击生成
</div>

<button
onclick="genArticle()"
class="w-full mt-4 p-3 rounded-2xl bg-blue-500 text-white">
生成短文
</button>

</div>

<div class="glass rounded-3xl p-5">
📈 数据

<div id="dataBox"></div>

</div>

</div>

</section>

<!-- 词书 -->

<section
id="books"
class="section">

<div class="glass rounded-3xl p-5">

<select
id="categorySelect"
class="w-full rounded-2xl p-3 border mb-4">

<option value="cet4">四级</option>
<option value="cet6">六级</option>
<option value="kaoyan">考研</option>
<option value="ielts">雅思</option>
<option value="toefl">托福</option>

</select>

<input
id="searchInput"
placeholder="搜索英文 / 中文"
class="w-full rounded-2xl p-3 border mb-4">

<div
id="wordList"
class="space-y-3">
</div>

</div>

</section>

<!-- AI -->

<section
id="ai"
class="section">

<div class="glass rounded-3xl p-5">

<div class="text-xl font-bold">
🤖 AI工具
</div>

<textarea
id="sentenceInput"
class="w-full mt-4 p-3 rounded-2xl border"
rows="4"
placeholder="粘贴英文句子"></textarea>

<button
onclick="analyzeSentence()"
class="w-full mt-3 p-3 rounded-2xl bg-blue-500 text-white">
长难句分析
</button>

<div
id="analysisBox"
class="mt-4 text-sm">
</div>

</div>

</section>

<!-- 我的 -->

<section
id="mine"
class="section">

<div class="glass rounded-3xl p-5">

<div>⭐ 收藏</div>

<div
id="favBox"
class="mt-3 space-y-2">
</div>

<div class="mt-5">
📝 笔记
</div>

<textarea
id="noteInput"
class="w-full mt-3 p-3 rounded-2xl border"
rows="5"></textarea>

<button
onclick="saveNote()"
class="w-full mt-3 p-3 rounded-2xl bg-green-500 text-white">
保存笔记
</button>

<button
onclick="exportFav()"
class="w-full mt-3 p-3 rounded-2xl bg-orange-500 text-white">
导出收藏
</button>

</div>

</section>

</main>

<div class="bottom-nav">

<div
class="tab active"
onclick="showPage('home',this)">
🏠
</div>

<div
class="tab"
onclick="showPage('books',this)">
📚
</div>

<div class="tab">
🎧
</div>

<div
class="tab"
onclick="showPage('ai',this)">
🤖
</div>

<div
class="tab"
onclick="showPage('mine',this)">
👤
</div>

</div>

<script>

let words=[];
let favorites=
JSON.parse(
localStorage.getItem("favorites")||"[]"
);

let wrongWords=
JSON.parse(
localStorage.getItem("wrongWords")||"[]"
);

let notes=
localStorage.getItem("notes")||"";

document
.getElementById(
"noteInput"
).value=notes;

function showPage(id,el){

document
.querySelectorAll(".section")
.forEach(s=>
s.classList.remove("show")
);

document
.getElementById(id)
.classList.add("show");

document
.querySelectorAll(".tab")
.forEach(t=>
t.classList.remove("active")
);

el.classList.add("active");

renderFav();

}

async function loadWords(){

let file=
`date/${
document
.getElementById(
"categorySelect"
).value
}.json`;

let res=
await fetch(file);

words=
await res.json();

renderWords();

updateStats();

}

function renderWords(){

let q=
document
.getElementById(
"searchInput"
).value
.toLowerCase();

let html="";

words
.filter(w=>

(w.word||"")
.toLowerCase()
.includes(q)

||

(w.trans||"")
.includes(q)

)

.slice(0,100)

.forEach(w=>{

let word=w.word||"";
let trans=w.trans||"";
let p=w.phonetic||"";

html+=`

<div class="glass rounded-3xl p-4 card">

<div class="flex justify-between">

<div>

<div class="font-bold text-lg">
${word}
</div>

<div class="text-gray-500">
${p}
</div>

<div class="mt-2">
${trans}
</div>

</div>

<div class="space-y-2">

<button
onclick="speak('${word}')">
🔊
</button>

<button
onclick="fav('${word}')">
⭐
</button>

<button
onclick="wrong('${word}')">
❌
</button>

</div>

</div>

</div>

`;

});

document
.getElementById(
"wordList"
).innerHTML=html;

}

function speak(word){

let u=
new SpeechSynthesisUtterance(
word
);

u.lang="en-US";

speechSynthesis.speak(u);

}

function fav(w){

if(!favorites.includes(w)){

favorites.push(w);

}

localStorage.setItem(
"favorites",
JSON.stringify(
favorites
)
);

renderFav();

updateStats();

}

function wrong(w){

if(!wrongWords.includes(w)){

wrongWords.push(w);

}

localStorage.setItem(
"wrongWords",
JSON.stringify(
wrongWords
)
);

updateStats();

}

function renderFav(){

let html="";

favorites.forEach(w=>{

html+=
`<div>${w}</div>`;

});

document
.getElementById(
"favBox"
).innerHTML=html;

}

function saveNote(){

localStorage.setItem(
"notes",
document
.getElementById(
"noteInput"
).value
);

}

function exportFav(){

let blob=
new Blob(
[
favorites.join("\n")
]
);

let a=
document
.createElement("a");

a.href=
URL.createObjectURL(blob);

a.download=
"favorites.txt";

a.click();

}

function genArticle(){

let pick=
favorites
.slice(0,3)
.join(", ");

document
.getElementById(
"articleBox"
).innerHTML=

`Today we review:
<b>${pick}</b>.
These words often appear in academic English.`;

}

function analyzeSentence(){

let t=
document
.getElementById(
"sentenceInput"
).value;

document
.getElementById(
"analysisBox"
).innerHTML=

`句子：${t}<br><br>
结构拆分：主语 + 谓语 + 宾语`;

}

function startTest(){

alert(
"词汇量测试功能已开启（后续可扩展10题）"
);

}

function updateStats(){

document
.getElementById(
"stats"
).innerHTML=

`总词：
${words.length}

｜
收藏：
${favorites.length}

｜
错词：
${wrongWords.length}`;

document
.getElementById(
"wrongCount"
).innerText=
wrongWords.length;

document
.getElementById(
"dataBox"
).innerHTML=

`学习：
${favorites.length+wrongWords.length}词`;

}

document
.getElementById(
"themeBtn"
)
.onclick=()=>{

document.body
.classList.toggle(
"dark"
);

};

document
.getElementById(
"searchInput"
)
.addEventListener(
"input",
renderWords
);

document
.getElementById(
"categorySelect"
).onchange=
loadWords;

loadWords();

renderFav();

</script>

</body>
</html>
