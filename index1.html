<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>张桂林不要熬夜</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    overflow:hidden;
    background:black;
    font-family:"Microsoft YaHei";
}

canvas{
    position:fixed;
    top:0;
    left:0;
}

.center{

    position:absolute;

    width:100%;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    text-align:center;

    z-index:10;
}

.title{

    font-size:clamp(42px,10vw,110px);

    font-weight:bold;

    color:#ff5ca8;

    line-height:1.2;

    text-shadow:
    0 0 10px #ff5ca8,
    0 0 20px #ff5ca8,
    0 0 40px #ff0080,
    0 0 80px #ff0080;

    animation:pulse 2s infinite alternate;
}

.tip{

    margin-top:20px;

    font-size:clamp(18px,4vw,30px);

    color:white;

    opacity:0.9;

    text-shadow:0 0 10px white;
}

.bottom{

    position:absolute;

    bottom:50px;

    width:100%;

    text-align:center;

    color:white;

    font-size:18px;

    opacity:0.8;

    z-index:20;

    animation:updown 2s infinite;
}

@keyframes pulse{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }
}

@keyframes updown{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="center">

    <div class="title">
        张桂林<br>
        不要熬夜
    </div>

    <div class="tip">
        ✨ 晚安比熬夜更浪漫 ✨
    </div>

</div>

<div class="bottom">
    💖 点击屏幕有惊喜 💖
</div>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}

resize();

window.onresize=resize;

let particles=[];
let fireworks=[];
let hearts=[];

function heartShape(t){

    let x=16*Math.pow(Math.sin(t),3);

    let y=13*Math.cos(t)
          -5*Math.cos(2*t)
          -2*Math.cos(3*t)
          -Math.cos(4*t);

    return {x,y};
}

class Particle{

    constructor(){

        let t=Math.random()*Math.PI*2;

        let h=heartShape(t);

        this.x=canvas.width/2+h.x*18;

        this.y=canvas.height/2-h.y*18;

        this.size=Math.random()*4+1;

        this.offset=Math.random()*100;

        this.color=`hsla(${330+Math.random()*40},100%,70%,1)`;
    }

    draw(time){

        let scale=1+Math.sin(time*0.002+this.offset)*0.08;

        let x=canvas.width/2+(this.x-canvas.width/2)*scale;

        let y=canvas.height/2+(this.y-canvas.height/2)*scale;

        ctx.beginPath();

        ctx.arc(x,y,this.size,0,Math.PI*2);

        ctx.fillStyle=this.color;

        ctx.shadowBlur=20;

        ctx.shadowColor=this.color;

        ctx.fill();
    }
}

for(let i=0;i<3500;i++){

    particles.push(new Particle());
}

function stars(){

    for(let i=0;i<100;i++){

        let x=Math.random()*canvas.width;

        let y=Math.random()*canvas.height;

        let r=Math.random()*2;

        ctx.beginPath();

        ctx.arc(x,y,r,0,Math.PI*2);

        ctx.fillStyle="white";

        ctx.fill();
    }
}

class Firework{

    constructor(x,y){

        this.x=x;
        this.y=y;

        this.life=100;

        this.particles=[];

        for(let i=0;i<80;i++){

            this.particles.push({

                x:x,
                y:y,

                dx:(Math.random()-0.5)*8,
                dy:(Math.random()-0.5)*8,

                size:Math.random()*4+1,

                color:`hsla(${330+Math.random()*40},100%,70%,1)`
            });
        }
    }

    draw(){

        this.life--;

        this.particles.forEach(p=>{

            p.x+=p.dx;
            p.y+=p.dy;

            ctx.beginPath();

            ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

            ctx.fillStyle=p.color;

            ctx.shadowBlur=20;

            ctx.shadowColor=p.color;

            ctx.fill();
        });
    }
}

document.addEventListener("click",e=>{

    fireworks.push(new Firework(e.clientX,e.clientY));
});

function meteors(time){

    for(let i=0;i<3;i++){

        let x=(time*0.2+i*500)%canvas.width;

        let y=(time*0.1+i*200)%canvas.height;

        ctx.beginPath();

        ctx.moveTo(x,y);

        ctx.lineTo(x-120,y-120);

        ctx.strokeStyle="rgba(255,255,255,0.8)";

        ctx.lineWidth=2;

        ctx.stroke();
    }
}

function animate(time){

    ctx.fillStyle="rgba(0,0,0,0.15)";

    ctx.fillRect(0,0,canvas.width,canvas.height);

    stars();

    meteors(time);

    particles.forEach(p=>{

        p.draw(time);
    });

    fireworks.forEach((f,index)=>{

        f.draw();

        if(f.life<=0){

            fireworks.splice(index,1);
        }
    });

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
