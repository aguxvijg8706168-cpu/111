<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>张桂林不要熬夜 ❤</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:"Microsoft YaHei";
    height:100vh;
}

/* 星空背景 */

canvas{
    position:fixed;
    top:0;
    left:0;
}

/* 主文字 */

.center{
    position:absolute;
    width:100%;
    top:50%;
    transform:translateY(-50%);
    text-align:center;
    z-index:10;
}

.title{
    font-size:70px;
    font-weight:bold;
    color:#ff4fa3;

    text-shadow:
    0 0 10px #ff4fa3,
    0 0 20px #ff4fa3,
    0 0 40px #ff4fa3,
    0 0 80px #ff4fa3;

    animation: glow 2s infinite alternate;
}

.sub{
    margin-top:25px;
    font-size:28px;
    color:white;
    letter-spacing:5px;

    animation: float 3s infinite ease-in-out;
}

/* 底部提示 */

.tip{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    color:white;
    font-size:18px;
    opacity:0.8;
    z-index:10;
}

/* AI对话框 */

.ai-box{
    position:fixed;
    right:20px;
    bottom:20px;

    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);

    backdrop-filter:blur(10px);

    color:white;
    padding:15px 20px;
    border-radius:20px;

    z-index:999;

    font-size:16px;

    animation: aiFloat 3s infinite;
}

/* 呼吸动画 */

@keyframes glow{

    from{
        text-shadow:
        0 0 10px #ff4fa3,
        0 0 20px #ff4fa3,
        0 0 40px #ff4fa3;
    }

    to{
        text-shadow:
        0 0 20px #ff4fa3,
        0 0 40px #ff4fa3,
        0 0 80px #ff4fa3,
        0 0 120px #ff4fa3;
    }
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

@keyframes aiFloat{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-5px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* 手机适配 */

@media(max-width:768px){

    .title{
        font-size:42px;
        padding:0 20px;
    }

    .sub{
        font-size:20px;
    }

    .tip{
        font-size:14px;
        bottom:25px;
    }

    .ai-box{
        right:10px;
        bottom:10px;
        font-size:14px;
    }
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="center">

    <div class="title">
        张桂林不要熬夜
    </div>

    <div class="sub">
        ❤ 早点休息 晚安比熬夜更浪漫 ❤
    </div>

</div>

<div class="tip">
    点击屏幕有惊喜 ✨
</div>

<div class="ai-box" id="aiBox">
    ❤ AI提醒：该睡觉啦
</div>

<!-- 背景音乐 -->
<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f4e3c7cf.mp3?filename=beautiful-relaxing-music-117084.mp3">
</audio>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* 星空粒子 */

let stars = [];

for(let i=0;i<250;i++){

    stars.push({

        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*1
    });
}

function drawStars(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

    for(let s of stars){

        ctx.beginPath();

        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

        ctx.fill();

        s.y += s.d;

        if(s.y > canvas.height){

            s.y = 0;
            s.x = Math.random()*canvas.width;
        }
    }

    requestAnimationFrame(drawStars);
}

drawStars();

/* 点击爆炸爱心 */

document.addEventListener("click",(e)=>{

    document.getElementById("bgm").play();

    createExplosion(e.clientX,e.clientY);

    changeAI();
});

function createExplosion(x,y){

    for(let i=0;i<35;i++){

        let heart = document.createElement("div");

        heart.innerHTML = "❤";

        heart.style.position="fixed";

        heart.style.left=x+"px";
        heart.style.top=y+"px";

        heart.style.fontSize=(Math.random()*30+20)+"px";

        heart.style.color=
        `hsl(${Math.random()*360},100%,70%)`;

        heart.style.pointerEvents="none";

        heart.style.zIndex=999;

        heart.style.transition="1.8s";

        document.body.appendChild(heart);

        let dx=(Math.random()-0.5)*500;
        let dy=(Math.random()-0.5)*500;

        setTimeout(()=>{

            heart.style.transform=
            `translate(${dx}px,${dy}px)
            scale(0)
            rotate(720deg)`;

            heart.style.opacity=0;

        },10);

        setTimeout(()=>{

            heart.remove();

        },1800);
    }
}

/* 鼠标流光 */

document.addEventListener("mousemove",(e)=>{

    let dot=document.createElement("div");

    dot.style.position="fixed";

    dot.style.left=e.clientX+"px";
    dot.style.top=e.clientY+"px";

    dot.style.width="10px";
    dot.style.height="10px";

    dot.style.borderRadius="50%";

    dot.style.background="#ff4fa3";

    dot.style.boxShadow=
    "0 0 10px #ff4fa3";

    dot.style.pointerEvents="none";

    dot.style.zIndex=999;

    document.body.appendChild(dot);

    setTimeout(()=>{

        dot.style.transition="1s";

        dot.style.opacity=0;

        dot.style.transform="scale(3)";

    },10);

    setTimeout(()=>{

        dot.remove();

    },1000);
});

/* AI互动 */

const aiText=[

"❤ 张桂林该睡觉啦",

"✨ 熬夜会变成小熊猫哦",

"🌙 晚安比熬夜更浪漫",

"💤 今天也辛苦啦",

"❤ 早点休息吧"
];

function changeAI(){

    let ai=document.getElementById("aiBox");

    ai.innerHTML=
    aiText[Math.floor(Math.random()*aiText.length)];
}

/* 手机尺寸变化 */

window.addEventListener("resize",()=>{

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});

</script>

</body>
</html>
