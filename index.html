<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>比分抽奖系统 PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e1e2f,#2c3e50);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:20px;
    font-size:28px;
}

.box{
    width:260px;
    height:120px;
    background:#111;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    font-weight:bold;
    color:#00ffcc;
    margin:20px auto;
    box-shadow:0 0 20px rgba(0,255,204,0.3);
}

button{
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#00ffcc;
    color:#000;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.small{
    margin-top:15px;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎰 比分随机抽奖 PRO</h1>

    <div class="box" id="result">--</div>

    <button onclick="startDraw()">开始抽取</button>

    <div class="small">等概率随机 · GitHub Pages 可部署</div>
</div>

<script>

// 你的所有比分（完整）
const scores = [
"1:0","2:0","2:1","3:0","3:1",
"3:2","4:0","4:1","4:2","5:0",
"5:1","5:2","胜其它",
"0:0","1:1","2:2","3:3","平其它",
"0:1","0:2","1:2","0:3","1:3",
"2:3","0:4","1:4","2:4","0:5",
"1:5","2:5","负其它"
];

let timer = null;

// 老虎机滚动效果
function startDraw(){

    let i = 0;

    // 防止重复点击
    clearInterval(timer);

    timer = setInterval(() => {
        const randomIndex = Math.floor(Math.random() * scores.length);
        document.getElementById("result").innerText = scores[randomIndex];
        i++;
    }, 80); // 滚动速度

    // 3秒后停止
    setTimeout(() => {
        clearInterval(timer);

        const finalIndex = Math.floor(Math.random() * scores.length);
        document.getElementById("result").innerText = scores[finalIndex];

    }, 3000);
}

</script>

</body>
</html>
