<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no" />

<title>杨艺涵 · 星空晚安</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:"Noto Sans SC",sans-serif;
}

body{
    position:relative;
}

/* 星空背景 */

#bg{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    z-index:1;
}

/* 光晕 */

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.5;
    animation:moveGlow 10s infinite alternate;
}

.glow1{
    width:400px;
    height:400px;
    background:#ff4fd8;
    left:-100px;
    top:-100px;
}

.glow2{
    width:500px;
    height:500px;
    background:#6a5cff;
    right:-150px;
    bottom:-150px;
    animation-delay:3s;
}

@keyframes moveGlow{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(80px);
    }
}

/* 主内容 */

.main{
    position:relative;
    z-index:10;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

/* 标题 */

.title{
    font-size:72px;
    font-weight:900;
    color:white;
    letter-spacing:8px;
    text-shadow:
    0 0 20px rgba(255,255,255,0.5),
    0 0 40px rgba(255,0,150,0.5);
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
    100%{
        transform:translateY(0px);
    }
}

/* 副标题 */

.desc{
    margin-top:20px;
    font-size:22px;
    color:rgba(255,255,255,0.8);
    letter-spacing:4px;
}

/* 爱心按钮 */

.heart-btn{
    margin-top:60px;
    width:160px;
    height:160px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.4s;
    animation:heartBeat 1.5s infinite;
    box-shadow:
    0 0 30px rgba(255,0,120,0.3);
}

.heart-btn:hover{
    transform:scale(1.08);
}

@keyframes heartBeat{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
    100%{
        transform:scale(1);
    }
}

.heart{
    font-size:90px;
    color:#ff4da6;
}

/* 按钮 */

.btns{
    margin-top:40px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    padding:14px 36px;
    border-radius:999px;
    background:rgba(255,255,255,0.08);
    color:white;
    border:1px solid rgba(255,255,255,0.2);
    cursor:pointer;
    transition:0.4s;
    backdrop-filter:blur(10px);
}

.btn:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,0.15);
}

/* 音乐按钮 */

.music-btn{
    position:fixed;
    right:30px;
    top:30px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:30px;
    cursor:pointer;
    z-index:9999;
    animation:rotate 5s linear infinite;
    border:1px solid rgba(255,255,255,0.2);
}

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

/* 弹窗 */

.message{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%) scale(0);
    width:320px;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    color:white;
    z-index:99999;
    transition:0.5s;
    border:1px solid rgba(255,255,255,0.15);
}

.message.show{
    transform:translate(-50%,-50%) scale(1);
}

.message h2{
    margin-bottom:20px;
    font-size:34px;
}

.message p{
    line-height:1.8;
    color:rgba(255,255,255,0.85);
}

.close{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:999px;
    background:#ff4da6;
    color:white;
    cursor:pointer;
}

/* 手机适配 */

@media(max-width:768px){

    .title{
        font-size:42px;
        letter-spacing:3px;
    }

    .desc{
        font-size:16px;
    }

    .heart-btn{
        width:120px;
        height:120px;
    }

    .heart{
        font-size:60px;
    }

}

</style>
</head>

<body>

<!-- 音乐 -->
<audio id="bgm" autoplay loop>
    <source src="suisuinian.mp3" type="audio/mpeg">
</audio>

<!-- 星空 -->
<canvas id="bg"></canvas>

<!-- 光晕 -->
<div class="glow glow1"></div>
<div class="glow glow2"></div>

<!-- 音乐按钮 -->
<div class="music-btn" onclick="toggleMusic()">
🎵
</div>

<!-- 主内容 -->
<div class="main">

    <div class="title">
        杨艺涵
    </div>

    <div class="desc">
        “今晚的星星，也在偷偷想你。”
    </div>

    <div class="heart-btn" onclick="showMessage()">
        <div class="heart">❤</div>
    </div>

    <div class="btns">

        <div class="btn" onclick="createHearts()">
            浪漫模式
        </div>

        <div class="btn" onclick="changeText()">
            想你一下
        </div>

        <div class="btn" onclick="fireworks()">
            烟花
        </div>

    </div>

</div>

<!-- 弹窗 -->

<div class="message" id="message">

    <h2>杨艺涵</h2>

    <p>
        希望你每天都开心。<br>
        像今晚的星空一样闪耀。
    </p>

    <button class="close" onclick="closeMessage()">
        知道啦
    </button>

</div>

<script>

/* 自动播放 */

document.body.addEventListener('click', function () {
    const music = document.getElementById('bgm');
    music.play();
});

/* 音乐控制 */

function toggleMusic(){

    const music = document.getElementById('bgm');

    if(music.paused){
        music.play();
    }else{
        music.pause();
    }

}

/* 星空 */

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<250;i++){

    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*1
    });

}

function drawStars(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

    for(let i=0;i<stars.length;i++){

        let s = stars[i];

        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();

    }

    moveStars();

}

function moveStars(){

    for(let i=0;i<stars.length;i++){

        let s = stars[i];

        s.y += s.d;

        if(s.y > canvas.height){

            s.y = 0;
            s.x = Math.random()*canvas.width;

        }

    }

}

setInterval(drawStars,33);

/* 弹窗 */

function showMessage(){

    document.getElementById('message').classList.add('show');

}

function closeMessage(){

    document.getElementById('message').classList.remove('show');

}

/* 爱心粒子 */

function createHearts(){

    for(let i=0;i<20;i++){

        let heart = document.createElement('div');

        heart.innerHTML = '❤';

        heart.style.position='fixed';
        heart.style.left=Math.random()*window.innerWidth+'px';
        heart.style.top=window.innerHeight+'px';
        heart.style.color='#ff4da6';
        heart.style.fontSize=Math.random()*30+20+'px';
        heart.style.zIndex='99999';
        heart.style.pointerEvents='none';
        heart.style.transition='3s';

        document.body.appendChild(heart);

        setTimeout(()=>{

            heart.style.top='-100px';
            heart.style.opacity='0';

        },100);

        setTimeout(()=>{

            heart.remove();

        },3000);

    }

}

/* 文字切换 */

function changeText(){

    const texts = [
        "今天也要开心。",
        "杨艺涵是今晚最亮的星。",
        "希望你永远被温柔对待。",
        "晚风会替我想你。",
        "碎碎念也会变成浪漫。"
    ];

    document.querySelector('.desc').innerHTML =
    texts[Math.floor(Math.random()*texts.length)];

}

/* 烟花 */

function fireworks(){

    for(let i=0;i<80;i++){

        let dot = document.createElement('div');

        dot.style.position='fixed';
        dot.style.left=window.innerWidth/2+'px';
        dot.style.top=window.innerHeight/2+'px';
        dot.style.width='6px';
        dot.style.height='6px';
        dot.style.borderRadius='50%';
        dot.style.background='white';
        dot.style.zIndex='99999';
        dot.style.pointerEvents='none';

        document.body.appendChild(dot);

        let x = (Math.random()-0.5)*800;
        let y = (Math.random()-0.5)*800;

        dot.animate([
            {
                transform:'translate(0,0)',
                opacity:1
            },
            {
                transform:`translate(${x}px,${y}px)`,
                opacity:0
            }
        ],{
            duration:1500
        });

        setTimeout(()=>{
            dot.remove();
        },1500);

    }

}

/* 鼠标粒子 */

document.addEventListener('mousemove',function(e){

    let dot = document.createElement('div');

    dot.style.position='fixed';
    dot.style.left=e.clientX+'px';
    dot.style.top=e.clientY+'px';
    dot.style.width='5px';
    dot.style.height='5px';
    dot.style.borderRadius='50%';
    dot.style.background='white';
    dot.style.pointerEvents='none';
    dot.style.zIndex='99999';

    document.body.appendChild(dot);

    dot.animate([
        {
            opacity:1,
            transform:'scale(1)'
        },
        {
            opacity:0,
            transform:'scale(4)'
        }
    ],{
        duration:800
    });

    setTimeout(()=>{
        dot.remove();
    },800);

});

</script>

</body>
</html>
