<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />

<title>杨艺涵 · 银河音乐宇宙</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:"Noto Sans SC",sans-serif;
}

#bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
}

/* 银河背景 */

.galaxy{
    position:fixed;
    width:900px;
    height:900px;
    border-radius:50%;
    filter:blur(140px);
    opacity:.32;
    z-index:2;
    animation:float 10s ease-in-out infinite;
}

.g1{
    background:#6d5cff;
    left:-250px;
    top:-250px;
}

.g2{
    background:#00d0ff;
    right:-250px;
    bottom:-250px;
    animation-delay:4s;
}

@keyframes float{

    0%{
        transform:translateY(0px) scale(1);
    }

    50%{
        transform:translateY(40px) scale(1.1);
    }

    100%{
        transform:translateY(0px) scale(1);
    }
}

/* 页面主体 */

.main{
    position:relative;
    z-index:10;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

/* 标题 */

.title{
    font-size:92px;
    font-weight:900;
    color:white;
    letter-spacing:10px;

    text-shadow:
    0 0 20px rgba(255,255,255,.9),
    0 0 50px rgba(109,92,255,.9),
    0 0 100px rgba(0,208,255,.8);

    animation:titleFloat 5s ease-in-out infinite;
}

@keyframes titleFloat{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0px);
    }
}

.sub{
    margin-top:18px;
    color:rgba(255,255,255,.78);
    letter-spacing:6px;
    font-size:18px;
}

/* 卡片 */

.card{
    margin-top:45px;
    width:420px;
    padding:35px;
    border-radius:32px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
    0 0 40px rgba(255,255,255,.05),
    0 0 90px rgba(109,92,255,.18);
}

.card-text{
    color:white;
    line-height:2;
    font-size:18px;
}

/* 按钮 */

.btns{
    margin-top:28px;
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{

    border:none;

    padding:14px 30px;

    border-radius:999px;

    color:white;

    cursor:pointer;

    font-size:15px;

    transition:.4s;

    background:
    linear-gradient(135deg,#6d5cff,#00d0ff);

    box-shadow:
    0 0 30px rgba(109,92,255,.45);
}

.btn:hover{

    transform:
    translateY(-5px)
    scale(1.05);

    box-shadow:
    0 0 50px rgba(0,208,255,.7);
}

/* 音乐按钮 */

.music-btn{

    position:fixed;

    right:30px;
    top:30px;

    width:70px;
    height:70px;

    border-radius:50%;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.15);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;

    font-size:30px;

    cursor:pointer;

    z-index:9999;

    animation:rotate 6s linear infinite;
}

@keyframes rotate{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* 频谱区域 */

.visualizer{
    position:fixed;
    left:50%;
    bottom:100px;
    transform:translateX(-50%);

    width:80%;
    height:140px;

    display:flex;
    align-items:flex-end;
    justify-content:center;

    gap:4px;

    z-index:20;
}

.bar{

    width:10px;

    border-radius:999px;

    background:
    linear-gradient(to top,#6d5cff,#00d0ff,#ffffff);

    box-shadow:
    0 0 20px rgba(0,208,255,.8);

    transition:.08s;
}

/* 鼠标拖尾 */

.trail{
    position:fixed;
    width:8px;
    height:8px;
    border-radius:50%;
    pointer-events:none;
    z-index:9999;

    background:white;

    box-shadow:
    0 0 12px white,
    0 0 24px #6d5cff,
    0 0 50px #00d0ff;

    animation:trailFade .8s linear forwards;
}

@keyframes trailFade{

    to{
        transform:scale(0);
        opacity:0;
    }
}

/* 页面转场 */

.transition{
    position:fixed;
    inset:0;
    background:black;
    z-index:999999;
    animation:fadeOut 2.2s forwards;
}

@keyframes fadeOut{

    to{
        opacity:0;
        pointer-events:none;
    }
}

/* 手机 */

@media(max-width:768px){

    .title{
        font-size:48px;
        letter-spacing:4px;
    }

    .sub{
        font-size:14px;
        letter-spacing:2px;
    }

    .card{
        width:92%;
        padding:24px;
    }

    .visualizer{
        width:95%;
        gap:2px;
        height:110px;
    }

    .bar{
        width:5px;
    }
}

</style>
</head>

<body>

<div class="transition"></div>

<!-- 音乐 -->
<audio id="bgm" loop>
    <source src="suisuinian.mp3" type="audio/mpeg">
</audio>

<!-- 星空 -->
<canvas id="bg"></canvas>

<!-- 银河 -->
<div class="galaxy g1"></div>
<div class="galaxy g2"></div>

<!-- 音乐按钮 -->
<div class="music-btn" onclick="toggleMusic()">
🎵
</div>

<!-- 主体 -->
<div class="main">

    <div class="title">
        杨艺涵
    </div>

    <div class="sub">
        银河会记住每一次心动
    </div>

    <div class="card">

        <div class="card-text" id="text">
            “如果思念有声音，<br>
            那一定像今晚的星空一样温柔。”
        </div>

        <div class="btns">

            <button class="btn" onclick="changeText()">
                换一句
            </button>

            <button class="btn" onclick="flashScreen()">
                电影模式
            </button>

            <button class="btn" onclick="loveText()">
                点一下
            </button>

        </div>

    </div>

</div>

<!-- 音乐频谱 -->
<div class="visualizer" id="visualizer"></div>

<script>

/* 自动播放 */

const music = document.getElementById("bgm");

window.addEventListener("click",()=>{

    music.play();

    initAudio();

},{once:true});

/* 音乐控制 */

function toggleMusic(){

    if(music.paused){

        music.play();

    }else{

        music.pause();

    }
}

/* 星空粒子文字 */

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

const mouse = {
    x:null,
    y:null,
    radius:120
};

window.addEventListener("mousemove",(e)=>{

    mouse.x = e.x;
    mouse.y = e.y;

    createTrail(e.x,e.y);

});

class Particle{

    constructor(x,y){

        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;

        this.originX = x;
        this.originY = y;

        this.size = 2;

        this.vx = 0;
        this.vy = 0;
    }

    draw(){

        ctx.fillStyle = "white";

        ctx.beginPath();

        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

        ctx.fill();
    }

    update(){

        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;

        let distance = Math.sqrt(dx*dx + dy*dy);

        if(distance < mouse.radius){

            let force =
            (mouse.radius-distance)/mouse.radius;

            let angle = Math.atan2(dy,dx);

            this.vx -= Math.cos(angle)*force*2;
            this.vy -= Math.sin(angle)*force*2;
        }

        this.x +=
        (this.originX-this.x)*0.05 + this.vx;

        this.y +=
        (this.originY-this.y)*0.05 + this.vy;

        this.vx *= 0.92;
        this.vy *= 0.92;

        this.draw();
    }
}

function initText(){

    particles = [];

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle = "white";

    ctx.font = "bold 150px sans-serif";

    ctx.textAlign = "center";

    ctx.fillText(
        "杨艺涵",
        canvas.width/2,
        canvas.height/2
    );

    const data = ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let y=0;y<data.height;y+=4){

        for(let x=0;x<data.width;x+=4){

            const index =
            (y*4*data.width)+(x*4);

            if(data.data[index+3] > 128){

                particles.push(
                    new Particle(x,y)
                );
            }
        }
    }
}

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let p of particles){

        p.update();
    }

    requestAnimationFrame(animate);
}

initText();
animate();

/* 鼠标拖尾 */

function createTrail(x,y){

    const dot = document.createElement("div");

    dot.className = "trail";

    dot.style.left = x+"px";
    dot.style.top = y+"px";

    document.body.appendChild(dot);

    setTimeout(()=>{

        dot.remove();

    },800);
}

/* 文案 */

const texts = [

    "你比银河更耀眼",

    "碎碎念也会变成浪漫",

    "今晚的风也会想你",

    "星空会记住每一次心动",

    "杨艺涵永远开心"

];

let index = 0;

function changeText(){

    index++;

    if(index>=texts.length){
        index=0;
    }

    document.getElementById("text")
    .innerHTML = texts[index];
}

/* 电影闪屏 */

function flashScreen(){

    const flash = document.createElement("div");

    flash.style.position = "fixed";
    flash.style.inset = "0";
    flash.style.background = "white";
    flash.style.zIndex = "999999";

    document.body.appendChild(flash);

    flash.animate([

        {opacity:0},
        {opacity:1},
        {opacity:0}

    ],{

        duration:900

    });

    setTimeout(()=>{

        flash.remove();

    },900);
}

/* 爱心文字 */

function loveText(){

    const msg = document.createElement("div");

    msg.innerHTML = "✨ 杨艺涵 ✨";

    msg.style.position = "fixed";

    msg.style.left = "50%";
    msg.style.top = "50%";

    msg.style.transform = "translate(-50%,-50%)";

    msg.style.color = "white";

    msg.style.fontSize = "40px";

    msg.style.fontWeight = "900";

    msg.style.zIndex = "999999";

    msg.style.textShadow =
    "0 0 20px white,0 0 60px #6d5cff";

    document.body.appendChild(msg);

    msg.animate([

        {
            opacity:0,
            transform:"translate(-50%,-50%) scale(.5)"
        },

        {
            opacity:1,
            transform:"translate(-50%,-50%) scale(1)"
        },

        {
            opacity:0,
            transform:"translate(-50%,-180%) scale(1.6)"
        }

    ],{

        duration:2000

    });

    setTimeout(()=>{

        msg.remove();

    },2000);
}

/* 音乐频谱 */

const visualizer = document.getElementById("visualizer");

const bars = [];

for(let i=0;i<64;i++){

    const bar = document.createElement("div");

    bar.className = "bar";

    bar.style.height = "20px";

    visualizer.appendChild(bar);

    bars.push(bar);
}

let analyser;
let dataArray;

function initAudio(){

    if(analyser) return;

    const audioContext =
    new(window.AudioContext || window.webkitAudioContext)();

    analyser = audioContext.createAnalyser();

    const source =
    audioContext.createMediaElementSource(music);

    source.connect(analyser);

    analyser.connect(audioContext.destination);

    analyser.fftSize = 128;

    const bufferLength = analyser.frequencyBinCount;

    dataArray = new Uint8Array(bufferLength);

    animateBars();
}

function animateBars(){

    requestAnimationFrame(animateBars);

    analyser.getByteFrequencyData(dataArray);

    for(let i=0;i<bars.length;i++){

        let value = dataArray[i];

        let height = value*0.6;

        bars[i].style.height =
        Math.max(10,height)+"px";
    }
}

</script>

</body>
</html>
