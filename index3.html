<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>天宇game - 手势切水果</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        user-select:none;
        -webkit-user-select:none;
        touch-action:none;
    }

    body{
        overflow:hidden;
        background:#000;
        font-family:Arial, Helvetica, sans-serif;
    }

    canvas{
        display:block;
    }

    #ui{
        position:fixed;
        inset:0;
        pointer-events:none;
        z-index:20;
    }

    #title{
        position:absolute;
        top:18px;
        left:50%;
        transform:translateX(-50%);
        font-size: clamp(28px,5vw,64px);
        font-weight:900;
        letter-spacing:4px;
        color:#fff;
        text-shadow:
            0 0 10px #00ffff,
            0 0 25px #00ffff,
            0 0 50px #00ffff;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow{
        from{
            transform:translateX(-50%) scale(1);
        }
        to{
            transform:translateX(-50%) scale(1.05);
        }
    }

    #score{
        position:absolute;
        top:90px;
        left:20px;
        color:white;
        font-size:32px;
        font-weight:bold;
        text-shadow:0 0 15px cyan;
    }

    #tip{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        color:white;
        text-align:center;
        font-size:28px;
        line-height:1.8;
        text-shadow:0 0 20px #00ffff;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse{
        0%{opacity:0.6;}
        50%{opacity:1;}
        100%{opacity:0.6;}
    }

    #cameraWrap{
        position:absolute;
        right:16px;
        bottom:16px;
        width:240px;
        height:180px;
        border-radius:18px;
        overflow:hidden;
        border:3px solid rgba(255,255,255,0.4);
        box-shadow:
            0 0 15px cyan,
            0 0 40px rgba(0,255,255,0.4);
        background:#111;
    }

    #video,
    #handCanvas{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        object-fit:cover;
        transform:scaleX(-1);
    }

    #mobileHint{
        position:absolute;
        bottom:210px;
        right:20px;
        color:white;
        font-size:14px;
        opacity:0.8;
    }

    @media(max-width:768px){
        #cameraWrap{
            width:150px;
            height:110px;
        }

        #score{
            font-size:24px;
        }

        #tip{
            font-size:20px;
            width:90%;
        }
    }
</style>
</head>

<body>

<div id="ui">
    <div id="title">⚡ 天宇game ⚡</div>
    <div id="score">得分: 0</div>

    <div id="tip">
        ⭐ 切开“3D星星”开始游戏<br>
        👉 用食指当光剑切水果
    </div>

    <div id="mobileHint">支持手机 / 电脑</div>

    <div id="cameraWrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="handCanvas"></canvas>
    </div>
</div>

<audio id="bgm" loop>
    <!-- 这里放你的本地音乐 -->
    <source src="dishimu.mp3" type="audio/mpeg">
</audio>

<script type="module">

/* =========================
   Three.js
========================= */

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js';

/* =========================
   MediaPipe
========================= */

import {
    HandLandmarker,
    FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

/* =========================
   基础场景
========================= */

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0x000000, 10, 60);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.z = 18;

const renderer = new THREE.WebGLRenderer({
    antialias:true,
    alpha:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

/* =========================
   灯光
========================= */

const ambient = new THREE.AmbientLight(0xffffff,1.3);
scene.add(ambient);

const light = new THREE.PointLight(0x00ffff,5,100);
light.position.set(0,10,10);
scene.add(light);

/* =========================
   星空背景
========================= */

const starsGeo = new THREE.BufferGeometry();
const starsCount = 3000;

const starPos = [];

for(let i=0;i<starsCount;i++){

    starPos.push(
        (Math.random()-0.5)*300,
        (Math.random()-0.5)*300,
        (Math.random()-0.5)*300
    );
}

starsGeo.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(starPos,3)
);

const starsMat = new THREE.PointsMaterial({
    color:0xffffff,
    size:0.2
});

const stars = new THREE.Points(starsGeo,starsMat);
scene.add(stars);

/* =========================
   游戏状态
========================= */

let score = 0;
let gameStarted = false;

const scoreEl = document.getElementById("score");
const tipEl = document.getElementById("tip");

/* =========================
   Emoji水果
========================= */

const fruits = [];
const emojis = ["🍎","🍉","🍊","🍓","🍌","🍍","🥝","🍑"];

function createEmojiTexture(emoji){

    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;

    const ctx = canvas.getContext('2d');

    ctx.font = "180px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillText(emoji,128,128);

    const texture = new THREE.CanvasTexture(canvas);

    return texture;
}

function spawnFruit(){

    const emoji = emojis[Math.floor(Math.random()*emojis.length)];

    const geometry = new THREE.PlaneGeometry(3,3);

    const material = new THREE.MeshBasicMaterial({
        map:createEmojiTexture(emoji),
        transparent:true
    });

    const fruit = new THREE.Mesh(geometry,material);

    fruit.position.x = (Math.random()-0.5)*18;
    fruit.position.y = -12;
    fruit.position.z = Math.random()*5-2;

    fruit.velocity = {
        x:(Math.random()-0.5)*0.08,
        y:0.18 + Math.random()*0.07
    };

    fruit.rotationSpeed = (Math.random()-0.5)*0.08;

    scene.add(fruit);
    fruits.push(fruit);
}

/* =========================
   3D开始星星
========================= */

let startStar;

function createStartStar(){

    const geometry = new THREE.IcosahedronGeometry(2,0);

    const material = new THREE.MeshStandardMaterial({
        color:0xffff00,
        emissive:0xffcc00,
        emissiveIntensity:2,
        metalness:0.8,
        roughness:0.2
    });

    startStar = new THREE.Mesh(geometry,material);

    startStar.position.set(0,0,0);

    scene.add(startStar);
}

createStartStar();

/* =========================
   光剑轨迹
========================= */

const trailPoints = [];
const trailMax = 20;

const trailGeo = new THREE.BufferGeometry();

const trailMat = new THREE.LineBasicMaterial({
    color:0x00ffff,
    transparent:true,
    opacity:1
});

const trailLine = new THREE.Line(trailGeo,trailMat);

scene.add(trailLine);

function updateTrail(x,y){

    trailPoints.push(new THREE.Vector3(x,y,0));

    if(trailPoints.length > trailMax){
        trailPoints.shift();
    }

    trailGeo.setFromPoints(trailPoints);
}

/* =========================
   粒子爆炸
========================= */

function explode(x,y){

    const particles = [];

    for(let i=0;i<25;i++){

        const geo = new THREE.SphereGeometry(0.06,8,8);

        const mat = new THREE.MeshBasicMaterial({
            color:0x00ffff
        });

        const p = new THREE.Mesh(geo,mat);

        p.position.set(x,y,0);

        p.vel = {
            x:(Math.random()-0.5)*0.4,
            y:(Math.random()-0.5)*0.4,
            z:(Math.random()-0.5)*0.4
        };

        p.life = 1;

        scene.add(p);

        particles.push(p);
    }

    function animateParticles(){

        for(let i=particles.length-1;i>=0;i--){

            const p = particles[i];

            p.position.x += p.vel.x;
            p.position.y += p.vel.y;
            p.position.z += p.vel.z;

            p.life -= 0.02;

            p.material.opacity = p.life;
            p.material.transparent = true;

            if(p.life <= 0){
                scene.remove(p);
                particles.splice(i,1);
            }
        }

        if(particles.length){
            requestAnimationFrame(animateParticles);
        }
    }

    animateParticles();
}

/* =========================
   音效 WebAudio
========================= */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSliceSound(){

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sawtooth";

    osc.frequency.setValueAtTime(600,audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(
        80,
        audioCtx.currentTime + 0.15
    );

    gain.gain.setValueAtTime(0.15,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + 0.15
    );

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

/* =========================
   摄像头
========================= */

const video = document.getElementById("video");
const handCanvas = document.getElementById("handCanvas");
const hctx = handCanvas.getContext("2d");

handCanvas.width = 240;
handCanvas.height = 180;

async function setupCamera(){

    const stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:"user"
        },
        audio:false
    });

    video.srcObject = stream;

    return new Promise(resolve=>{
        video.onloadedmetadata = ()=>{
            resolve(video);
        };
    });
}

/* =========================
   MediaPipe
========================= */

let handLandmarker;

async function createHandLandmarker(){

    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
    );

    handLandmarker = await HandLandmarker.createFromOptions(
        vision,
        {
            baseOptions:{
                modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
            },
            runningMode:"VIDEO",
            numHands:1
        }
    );
}

/* =========================
   手势检测
========================= */

let lastVideoTime = -1;

async function detectHands(){

    if(video.currentTime !== lastVideoTime){

        lastVideoTime = video.currentTime;

        const results = handLandmarker.detectForVideo(
            video,
            performance.now()
        );

        hctx.clearRect(0,0,handCanvas.width,handCanvas.height);

        if(results.landmarks.length){

            const landmarks = results.landmarks[0];

            drawHand(landmarks);

            const index = landmarks[8];

            const x = (1-index.x)*2-1;
            const y = -(index.y*2-1);

            const worldX = x * 12;
            const worldY = y * 7;

            updateTrail(worldX,worldY);

            checkSlice(worldX,worldY);
        }
    }

    requestAnimationFrame(detectHands);
}

function drawHand(landmarks){

    hctx.strokeStyle = "#00ffff";
    hctx.lineWidth = 2;

    const connections = [
        [0,1],[1,2],[2,3],[3,4],
        [0,5],[5,6],[6,7],[7,8],
        [5,9],[9,10],[10,11],[11,12],
        [9,13],[13,14],[14,15],[15,16],
        [13,17],[17,18],[18,19],[19,20],
        [0,17]
    ];

    for(const [a,b] of connections){

        const p1 = landmarks[a];
        const p2 = landmarks[b];

        hctx.beginPath();

        hctx.moveTo(
            p1.x*handCanvas.width,
            p1.y*handCanvas.height
        );

        hctx.lineTo(
            p2.x*handCanvas.width,
            p2.y*handCanvas.height
        );

        hctx.stroke();
    }

    for(const p of landmarks){

        hctx.fillStyle = "#ffffff";

        hctx.beginPath();

        hctx.arc(
            p.x*handCanvas.width,
            p.y*handCanvas.height,
            4,
            0,
            Math.PI*2
        );

        hctx.fill();
    }
}

/* =========================
   碰撞检测
========================= */

function checkSlice(x,y){

    // 开始星星

    if(startStar){

        const d = Math.hypot(
            x-startStar.position.x,
            y-startStar.position.y
        );

        if(d < 2){

            scene.remove(startStar);
            startStar = null;

            gameStarted = true;

            tipEl.style.display = "none";

            document.getElementById("bgm").play();

            playSliceSound();
        }
    }

    // 切水果

    for(let i=fruits.length-1;i>=0;i--){

        const f = fruits[i];

        const d = Math.hypot(
            x-f.position.x,
            y-f.position.y
        );

        if(d < 1.8){

            explode(f.position.x,f.position.y);

            playSliceSound();

            scene.remove(f);

            fruits.splice(i,1);

            score++;

            scoreEl.innerHTML = "得分: " + score;
        }
    }
}

/* =========================
   动画
========================= */

let spawnTimer = 0;

function animate(){

    requestAnimationFrame(animate);

    stars.rotation.y += 0.0008;

    if(startStar){

        startStar.rotation.x += 0.03;
        startStar.rotation.y += 0.03;

        startStar.position.y =
            Math.sin(Date.now()*0.003)*0.5;
    }

    if(gameStarted){

        spawnTimer++;

        if(spawnTimer > 40){

            spawnFruit();

            spawnTimer = 0;
        }
    }

    for(let i=fruits.length-1;i>=0;i--){

        const f = fruits[i];

        f.position.x += f.velocity.x;
        f.position.y += f.velocity.y;

        f.velocity.y -= 0.004;

        f.rotation.z += f.rotationSpeed;

        if(f.position.y < -15){

            scene.remove(f);
            fruits.splice(i,1);
        }
    }

    renderer.render(scene,camera);
}

animate();

/* =========================
   自适应
========================= */

window.addEventListener("resize",()=>{

    camera.aspect =
        window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

/* =========================
   初始化
========================= */

(async()=>{

    await setupCamera();

    await createHandLandmarker();

    detectHands();

})();

/* =========================
   手机点击解锁音频
========================= */

window.addEventListener("click",()=>{

    audioCtx.resume();

    document.getElementById("bgm").play();

},{once:true});

</script>

</body>
</html>
