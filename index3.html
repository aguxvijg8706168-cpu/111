<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>天宇game - 终极版</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
}

html,body{
    overflow:hidden;
    background:#000;
    font-family:
    Arial,
    "Microsoft YaHei",
    sans-serif;
}

/* =========================
   canvas
========================= */

canvas{
    display:block;
}

/* =========================
   UI
========================= */

#ui{
    position:fixed;
    inset:0;
    z-index:20;
    pointer-events:none;
}

/* LOGO */

#logo{
    position:absolute;
    top:16px;
    left:50%;
    transform:translateX(-50%);

    font-size:clamp(28px,6vw,72px);
    font-weight:900;

    color:#fff;

    text-shadow:
    0 0 10px #00ffff,
    0 0 25px #00ffff,
    0 0 55px #00ffff;

    animation:float 3s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:
        translateX(-50%)
        translateY(0px);
    }

    50%{
        transform:
        translateX(-50%)
        translateY(-5px);
    }

    100%{
        transform:
        translateX(-50%)
        translateY(0px);
    }
}

/* score */

#score{
    position:absolute;
    left:18px;
    top:20px;

    color:white;

    font-size:clamp(24px,5vw,52px);

    font-weight:900;

    text-shadow:
    0 0 10px cyan,
    0 0 30px cyan;
}

/* combo */

#combo{
    position:absolute;
    left:18px;
    top:72px;

    color:#ffcc00;

    font-size:clamp(16px,4vw,34px);

    font-weight:bold;

    text-shadow:
    0 0 10px orange,
    0 0 25px orange;
}

/* tip */

#tip{
    position:absolute;
    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);

    text-align:center;

    color:white;

    line-height:1.8;

    font-size:clamp(18px,4vw,34px);

    text-shadow:
    0 0 10px cyan,
    0 0 30px cyan;

    animation:pulse 1.5s infinite;
}

@keyframes pulse{

    0%{
        opacity:.4;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.4;
    }
}

/* 相机 */

#cameraBox{

    position:absolute;

    right:12px;
    bottom:12px;

    width:135px;
    height:180px;

    border-radius:24px;

    overflow:hidden;

    border:2px solid rgba(255,255,255,.3);

    box-shadow:
    0 0 18px cyan,
    0 0 45px rgba(0,255,255,.4);
}

#video,
#handCanvas{

    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

    transform:scaleX(-1);
}

/* 开始按钮 */

#startBtn{

    position:absolute;

    left:50%;
    bottom:110px;

    transform:translateX(-50%);

    padding:16px 34px;

    border:none;

    border-radius:999px;

    font-size:22px;

    font-weight:bold;

    color:white;

    background:
    linear-gradient(
    135deg,
    #00ffff,
    #0066ff
    );

    box-shadow:
    0 0 20px cyan,
    0 0 40px rgba(0,255,255,.6);

    pointer-events:auto;

    animation:btnGlow 1.6s infinite;
}

@keyframes btnGlow{

    0%{
        transform:
        translateX(-50%)
        scale(1);
    }

    50%{
        transform:
        translateX(-50%)
        scale(1.06);
    }

    100%{
        transform:
        translateX(-50%)
        scale(1);
    }
}

#hint{
    position:absolute;

    bottom:70px;
    width:100%;

    text-align:center;

    color:#aaa;

    font-size:13px;
}

/* cinematic */

#vignette{

    position:absolute;
    inset:0;

    background:
    radial-gradient(
    circle at center,
    transparent 45%,
    rgba(0,0,0,.55)
    );

    mix-blend-mode:multiply;
}

/* 手机 */

@media(min-width:768px){

    #cameraBox{

        width:220px;
        height:160px;
    }
}

</style>
</head>

<body>

<div id="ui">

    <div id="vignette"></div>

    <div id="logo">
        ⚡ 天宇game ⚡
    </div>

    <div id="score">
        得分 0
    </div>

    <div id="combo">
        COMBO x0
    </div>

    <div id="tip">
        ⭐ 切开能量核心开始游戏<br>
        ⚔ 挥动手指释放赛博光剑
    </div>

    <button id="startBtn">
        开始游戏
    </button>

    <div id="hint">
        建议开启声音体验最佳
    </div>

    <div id="cameraBox">

        <video
        id="video"
        autoplay
        playsinline
        muted>
        </video>

        <canvas id="handCanvas"></canvas>

    </div>

</div>

<!-- 背景音乐 -->
<audio
id="bgm"
loop
playsinline
webkit-playsinline>

<source
src="dishimu.mp3"
type="audio/mpeg">

</audio>

<script type="module">

/* =========================
   THREE
========================= */

import * as THREE from
'https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js';

/* =========================
   MEDIAPIPE
========================= */

import {
    HandLandmarker,
    FilesetResolver
}
from
'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0';

/* =========================
   性能优化
========================= */

/*
重点优化：

1. 星星数量减少
2. 降低像素比
3. 减少粒子
4. 减少geometry复杂度
5. 手势平滑插值
6. 降低MediaPipe负载
*/

/* =========================
   场景
========================= */

const scene = new THREE.Scene();

const camera =
new THREE.PerspectiveCamera(
    70,
    innerWidth/innerHeight,
    .1,
    1000
);

camera.position.z = 18;

/* =========================
   renderer
========================= */

const renderer =
new THREE.WebGLRenderer({

    antialias:false,
    alpha:true,

    powerPreference:
    "high-performance"
});

renderer.setSize(
    innerWidth,
    innerHeight
);

/* 手机优化 */

renderer.setPixelRatio(
    Math.min(
        devicePixelRatio,
        1
    )
);

document.body.appendChild(
    renderer.domElement
);

/* =========================
   light
========================= */

scene.add(
new THREE.AmbientLight(
    0xffffff,
    1.4
));

const light =
new THREE.PointLight(
    0x00ffff,
    5,
    100
);

light.position.set(0,8,10);

scene.add(light);

/* =========================
   星空（优化版）
========================= */

const starGeo =
new THREE.BufferGeometry();

const starArr = [];

/* 从4000减少到1200 */

for(let i=0;i<1200;i++){

    starArr.push(

        (Math.random()-0.5)*200,

        (Math.random()-0.5)*200,

        (Math.random()-0.5)*200
    );
}

starGeo.setAttribute(

    'position',

    new THREE.Float32BufferAttribute(
        starArr,
        3
    )
);

const stars =
new THREE.Points(

    starGeo,

    new THREE.PointsMaterial({

        color:0xffffff,

        size:.18
    })
);

scene.add(stars);

/* =========================
   UI
========================= */

const scoreEl =
document.getElementById("score");

const comboEl =
document.getElementById("combo");

const tipEl =
document.getElementById("tip");

/* =========================
   游戏数据
========================= */

let score = 0;
let combo = 0;
let gameStarted = false;

/* =========================
   音乐（手机兼容）
========================= */

const bgm =
document.getElementById("bgm");

/*
关键修复：

手机必须用户点击后
才能播放音乐
*/

async function startAudio(){

    try{

        bgm.volume = .8;

        await bgm.play();

        console.log("音乐播放成功");

    }catch(err){

        console.log("音乐失败",err);
    }
}

/* =========================
   WebAudio
========================= */

const audioCtx =
new (window.AudioContext ||
window.webkitAudioContext)();

function sliceSound(){

    const osc =
    audioCtx.createOscillator();

    const gain =
    audioCtx.createGain();

    osc.type = "triangle";

    osc.frequency.value = 800;

    gain.gain.value = .08;

    osc.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc.start();

    gain.gain.exponentialRampToValueAtTime(

        0.0001,

        audioCtx.currentTime + .12
    );

    osc.stop(
        audioCtx.currentTime + .12
    );
}

/* =========================
   开始能量核心
========================= */

let core;

function createCore(){

    const geo =
    new THREE.IcosahedronGeometry(
        1.8,
        0
    );

    const mat =
    new THREE.MeshStandardMaterial({

        color:0x00ffff,

        emissive:0x00ffff,

        emissiveIntensity:2
    });

    core =
    new THREE.Mesh(
        geo,
        mat
    );

    scene.add(core);
}

createCore();

/* =========================
   水果
========================= */

const fruits = [];

const emojis = [
    "🍉",
    "🍎",
    "🍊",
    "🍓",
    "🍑",
    "🥝"
];

function emojiTexture(emoji){

    const c =
    document.createElement("canvas");

    c.width = 128;
    c.height = 128;

    const ctx =
    c.getContext("2d");

    ctx.font = "90px serif";

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillText(
        emoji,
        64,
        64
    );

    return new THREE.CanvasTexture(c);
}

function spawnFruit(){

    const emoji =
    emojis[
        Math.floor(
            Math.random()*
            emojis.length
        )
    ];

    const fruit =
    new THREE.Mesh(

        new THREE.PlaneGeometry(
            2.4,
            2.4
        ),

        new THREE.MeshBasicMaterial({

            map:
            emojiTexture(emoji),

            transparent:true
        })
    );

    fruit.position.x =
    (Math.random()-.5)*14;

    fruit.position.y = -10;

    fruit.velocity = {

        x:(Math.random()-.5)*.05,

        y:.18 + Math.random()*.05
    };

    scene.add(fruit);

    fruits.push(fruit);
}

/* =========================
   光剑（超优化）
========================= */

const swordPoints = [];

const swordGeo =
new THREE.BufferGeometry();

const sword =
new THREE.Line(

    swordGeo,

    new THREE.LineBasicMaterial({

        color:0x00ffff
    })
);

scene.add(sword);

/* 平滑 */

let sx = 0;
let sy = 0;

function updateSword(x,y){

    /* 更平滑 */

    sx += (x-sx)*0.22;
    sy += (y-sy)*0.22;

    swordPoints.push(
        new THREE.Vector3(
            sx,
            sy,
            0
        )
    );

    if(swordPoints.length > 18){

        swordPoints.shift();
    }

    swordGeo.setFromPoints(
        swordPoints
    );
}

/* =========================
   粒子（大优化）
========================= */

const particles = [];

function boom(x,y){

    /* 35减少到10 */

    for(let i=0;i<10;i++){

        const p =
        new THREE.Mesh(

            new THREE.SphereGeometry(
                .05,
                4,
                4
            ),

            new THREE.MeshBasicMaterial({

                color:
                Math.random()>.5
                ?0x00ffff
                :0xff00ff,

                transparent:true
            })
        );

        p.position.set(x,y,0);

        p.vel = {

            x:(Math.random()-.5)*.22,

            y:(Math.random()-.5)*.22
        };

        p.life = 1;

        scene.add(p);

        particles.push(p);
    }
}

/* =========================
   camera
========================= */

const video =
document.getElementById("video");

const handCanvas =
document.getElementById("handCanvas");

const hctx =
handCanvas.getContext("2d");

handCanvas.width = 135;
handCanvas.height = 180;

async function setupCamera(){

    const stream =
    await navigator
    .mediaDevices
    .getUserMedia({

        video:{

            facingMode:"user",

            width:{
                ideal:320
            },

            height:{
                ideal:240
            }
        },

        audio:false
    });

    video.srcObject = stream;

    return new Promise(resolve=>{

        video.onloadedmetadata =
        ()=>resolve(video);
    });
}

/* =========================
   mediapipe
========================= */

let handLandmarker;

async function setupHand(){

    const vision =
    await FilesetResolver
    .forVisionTasks(

        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
    );

    handLandmarker =
    await HandLandmarker
    .createFromOptions(

        vision,

        {

            baseOptions:{

                modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
            },

            runningMode:"VIDEO",

            numHands:1
        }
    );
}

/* =========================
   检测（核心优化）
========================= */

let detectFrame = 0;

async function detectHands(){

    detectFrame++;

    /*
    超关键优化：

    每2帧检测一次
    */

    if(detectFrame % 2 === 0){

        const result =
        handLandmarker.detectForVideo(

            video,

            performance.now()
        );

        hctx.clearRect(
            0,
            0,
            handCanvas.width,
            handCanvas.height
        );

        if(result.landmarks.length){

            const lm =
            result.landmarks[0];

            drawHand(lm);

            const index =
            lm[8];

            const x =
            ((1-index.x)*2-1)*10;

            const y =
            (-(index.y*2-1))*6;

            updateSword(x,y);

            hitCheck(x,y);
        }
    }

    requestAnimationFrame(
        detectHands
    );
}

/* =========================
   手骨骼
========================= */

function drawHand(lm){

    hctx.strokeStyle =
    "#00ffff";

    hctx.lineWidth = 1.5;

    const cons = [

        [0,5],[5,6],[6,7],[7,8],

        [0,9],[9,10],[10,11],[11,12],

        [0,13],[13,14],[14,15],[15,16]
    ];

    /*
    骨骼减少
    更流畅
    */

    for(const [a,b] of cons){

        const p1 = lm[a];
        const p2 = lm[b];

        hctx.beginPath();

        hctx.moveTo(

            p1.x*
            handCanvas.width,

            p1.y*
            handCanvas.height
        );

        hctx.lineTo(

            p2.x*
            handCanvas.width,

            p2.y*
            handCanvas.height
        );

        hctx.stroke();
    }
}

/* =========================
   碰撞
========================= */

function hitCheck(x,y){

    if(core){

        const d =
        Math.hypot(

            x-core.position.x,

            y-core.position.y
        );

        if(d < 2){

            scene.remove(core);

            core = null;

            gameStarted = true;

            tipEl.style.display =
            "none";
        }
    }

    for(let i=fruits.length-1;i>=0;i--){

        const f = fruits[i];

        const d =
        Math.hypot(

            x-f.position.x,

            y-f.position.y
        );

        if(d < 1.4){

            boom(
                f.position.x,
                f.position.y
            );

            sliceSound();

            scene.remove(f);

            fruits.splice(i,1);

            score += 10;

            combo++;

            scoreEl.innerHTML =
            "得分 " + score;

            comboEl.innerHTML =
            "COMBO x" + combo;
        }
    }
}

/* =========================
   动画
========================= */

let timer = 0;

function animate(){

    requestAnimationFrame(
        animate
    );

    stars.rotation.y += .0003;

    if(core){

        core.rotation.x += .01;

        core.rotation.y += .01;

        core.position.y =
        Math.sin(
            Date.now()*.002
        )*.4;
    }

    if(gameStarted){

        timer++;

        if(timer > 45){

            spawnFruit();

            timer = 0;
        }
    }

    /* 水果 */

    for(let i=fruits.length-1;i>=0;i--){

        const f = fruits[i];

        f.position.x +=
        f.velocity.x;

        f.position.y +=
        f.velocity.y;

        f.velocity.y -= .0038;

        if(f.position.y < -12){

            scene.remove(f);

            fruits.splice(i,1);

            combo = 0;

            comboEl.innerHTML =
            "COMBO x0";
        }
    }

    /* 粒子 */

    for(let i=particles.length-1;i>=0;i--){

        const p = particles[i];

        p.position.x +=
        p.vel.x;

        p.position.y +=
        p.vel.y;

        p.life -= .05;

        p.material.opacity =
        p.life;

        if(p.life <= 0){

            scene.remove(p);

            particles.splice(i,1);
        }
    }

    renderer.render(
        scene,
        camera
    );
}

animate();

/* =========================
   resize
========================= */

addEventListener(
"resize",

()=>{

    camera.aspect =
    innerWidth/innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        innerWidth,
        innerHeight
    );
});

/* =========================
   启动
========================= */

(async()=>{

    await setupCamera();

    await setupHand();

    detectHands();

})();

/* =========================
   开始按钮
========================= */

document
.getElementById("startBtn")
.addEventListener(

"click",

async()=>{

    /* 手机音频解锁 */

    await audioCtx.resume();

    await startAudio();

    document
    .getElementById("startBtn")
    .style.display =
    "none";
});

</script>

</body>
</html>
