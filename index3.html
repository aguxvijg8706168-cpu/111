<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>天宇Game - 手势切水果</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Microsoft YaHei', sans-serif; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; background: radial-gradient(circle, #1a1a2e 0%, #000000 100%); }
        
        #game-title {
            position: absolute; top: 20px; left: 20px; color: #00ffcc;
            font-size: 32px; font-weight: bold; text-shadow: 0 0 10px #00ffcc; z-index: 10;
        }

        #ui-overlay {
            position: absolute; top: 70px; left: 20px; color: white;
            font-size: 20px; z-index: 10;
        }

        #video-container {
            position: absolute; bottom: 20px; right: 20px;
            width: 180px; height: 135px; border: 2px solid #00ffcc;
            border-radius: 8px; overflow: hidden; transform: scaleX(-1); z-index: 20;
        }
        canvas#output_canvas { width: 100%; height: 100%; object-fit: cover; }
        video#input_video { display: none; }

        #status-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; font-size: 18px; text-align: center; z-index: 100;
            line-height: 1.6; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="game-title">天宇game</div>
    <div id="ui-overlay">得分: <span id="score">0</span></div>
    
    <div id="status-msg">
        🚀 正在初始化引擎...<br>
        <span id="detail-msg">正在请求相机权限...</span>
    </div>

    <div id="video-container">
        <video id="input_video" playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const statusDetail = document.getElementById('detail-msg');
        const statusBox = document.getElementById('status-msg');

        let score = 0;
        let gameRunning = false;
        const emojiList = ['🧒', '👧', '👦', '👶', '🧑', '👱'];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let bgm = null;

        // --- 3D 渲染环境 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 100, 100);
        light.position.set(0, 5, 5);
        scene.add(light, new THREE.AmbientLight(0xffffff, 1));
        camera.position.z = 5;

        // --- 开始按钮 (3D星) ---
        const startStar = new THREE.Mesh(
            new THREE.OctahedronGeometry(0.6, 0),
            new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0xffaa00 })
        );
        scene.add(startStar);

        // --- 强化光剑拖尾 ---
        const trailPoints = [];
        const trailMax = 15;
        const trailGeometry = new THREE.BufferGeometry();
        const trailMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x00ffff, transparent: true, opacity: 0.7, side: THREE.DoubleSide, blending: THREE.AdditiveBlending 
        });
        const trailMesh = new THREE.Mesh(trailGeometry, trailMaterial);
        scene.add(trailMesh);

        // --- 核心逻辑 ---
        const video = document.getElementById("input_video");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        let handLandmarker;
        let lastVideoTime = -1;
        let fingerPos = new THREE.Vector3();

        async function setup() {
            try {
                // 1. 先启动相机
                statusDetail.innerText = "正在激活相机...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 } 
                });
                video.srcObject = stream;
                await video.play();

                // 2. 加载 AI 模型
                statusDetail.innerText = "正在从云端载入 AI 手势模型 (约 5MB)...";
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { 
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO", numHands: 1
                });

                statusBox.style.display = 'none';
                initBGM();
                requestAnimationFrame(renderLoop);
            } catch (err) {
                statusDetail.innerHTML = `<span style="color:red">失败: ${err.message}</span><br>请确保在 HTTPS 环境下打开并允许相机。`;
            }
        }

        function initBGM() {
            bgm = new Audio();
            bgm.src = "dishimu.mp3";
            bgm.loop = true;
        }

        function playSliceSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setTargetAtTime(800, audioCtx.currentTime, 0.01);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setTargetAtTime(0.3, audioCtx.currentTime, 0.01);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        const fruits = [];
        function spawnFruit() {
            if (!gameRunning) return;
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.font = '80px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(emojiList[Math.floor(Math.random() * emojiList.length)], 64, 64);
            
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.scale.set(0.8, 0.8, 1);
            const group = new THREE.Group();
            group.add(sprite);
            group.position.set((Math.random() - 0.5) * 7, -5, 0);
            group.userData = { vel: new THREE.Vector3((Math.random() - 0.5) * 0.1, 0.2, 0), rot: (Math.random()-0.5)*0.1 };
            scene.add(group);
            fruits.push(group);
        }

        function renderLoop() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];
                    drawConnectors(landmarks);
                    
                    const indexTip = landmarks[8];
                    // 映射坐标
                    const tx = (0.5 - indexTip.x) * 12 * (window.innerWidth / window.innerHeight);
                    const ty = (0.5 - indexTip.y) * 12;
                    fingerPos.lerp(new THREE.Vector3(tx, ty, 0), 0.7);
                    updateTrail(fingerPos.clone());
                    
                    // 碰撞检测
                    if (!gameRunning && fingerPos.distanceTo(startStar.position) < 0.8) {
                        gameRunning = true;
                        startStar.visible = false;
                        if (bgm) bgm.play().catch(e => console.log("等待点击播放音乐"));
                        setInterval(spawnFruit, 1000);
                    }
                    for (let i = fruits.length - 1; i >= 0; i--) {
                        if (fingerPos.distanceTo(fruits[i].position) < 0.7) {
                            playSliceSound();
                            scene.remove(fruits[i]);
                            fruits.splice(i, 1);
                            score += 10;
                            document.getElementById('score').innerText = score;
                        }
                    }
                } else {
                    updateTrail(null);
                }
            }

            if (!gameRunning) {
                startStar.rotation.y += 0.05;
                startStar.rotation.z += 0.02;
            }

            fruits.forEach((f, idx) => {
                f.position.add(f.userData.vel);
                f.userData.vel.y -= 0.005;
                f.rotation.z += f.userData.rot;
            });

            renderer.render(scene, camera);
            requestAnimationFrame(renderLoop);
        }

        function updateTrail(pos) {
            if (!pos) { trailPoints.length > 0 && trailPoints.shift(); } 
            else { trailPoints.push(pos); if (trailPoints.length > trailMax) trailPoints.shift(); }
            if (trailPoints.length < 2) { trailMesh.visible = false; return; }
            trailMesh.visible = true;
            const v = [];
            trailPoints.forEach((p, i) => {
                const w = (i / trailPoints.length) * 0.25;
                v.push(p.x, p.y - w, p.z, p.x, p.y + w, p.z);
            });
            trailGeometry.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
        }

        function drawConnectors(landmarks) {
            canvasCtx.strokeStyle = "#00ffcc";
            canvasCtx.lineWidth = 3;
            const conns = [[0,1,2,3,4], [0,5,6,7,8], [0,9,10,11,12], [0,13,14,15,16], [0,17,18,19,20], [5,9,13,17,5]];
            conns.forEach(p => {
                canvasCtx.beginPath();
                p.forEach((idx, i) => {
                    const x = landmarks[idx].x * canvasElement.width;
                    const y = landmarks[idx].y * canvasElement.height;
                    i === 0 ? canvasCtx.moveTo(x, y) : canvasCtx.lineTo(x, y);
                });
                canvasCtx.stroke();
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setup();
    </script>
</body>
</html>
