<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>天宇game - CYBER SLASH</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    touch-action:none;
    user-select:none;
}

html,body{
    overflow:hidden;
    background:#000;
    font-family:
    Arial,
    "Microsoft YaHei";
}

canvas{
    display:block;
}

/* =========================
   UI
========================= */

#ui{
    position:fixed;
    inset:0;
    z-index:100;
    pointer-events:none;
}

/* LOGO */

#logo{

    position:absolute;

    top:18px;
    left:50%;

    transform:translateX(-50%);

    font-size:
    clamp(34px,5vw,90px);

    font-weight:900;

    color:white;

    letter-spacing:6px;

    text-shadow:

    0 0 10px cyan,
    0 0 30px cyan,
    0 0 80px cyan;

    animation:
    logoFloat 3s ease-in-out infinite;
}

@keyframes logoFloat{

    0%{
        transform:
        translateX(-50%)
        translateY(0px);
    }

    50%{
        transform:
        translateX(-50%)
        translateY(-6px);
    }

    100%{
        transform:
        translateX(-50%)
        translateY(0px);
    }
}

/* SCORE */

#score{

    position:absolute;

    top:22px;
    left:22px;

    font-size:
    clamp(24px,5vw,52px);

    color:white;

    font-weight:900;

    text-shadow:

    0 0 10px cyan,
    0 0 25px cyan;
}

/* combo */

#combo{

    position:absolute;

    top:82px;
    left:22px;

    font-size:
    clamp(18px,4vw,36px);

    color:#ffcc00;

    font-weight:bold;

    text-shadow:

    0 0 10px orange,
    0 0 25px orange;
}

/* rank */

#rank{

    position:absolute;

    top:130px;
    left:22px;

    color:#ff00ff;

    font-size:
    clamp(18px,4vw,32px);

    font-weight:bold;

    text-shadow:

    0 0 10px #ff00ff,
    0 0 25px #ff00ff;
}

/* TIP */

#tip{

    position:absolute;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);

    text-align:center;

    color:white;

    line-height:1.9;

    font-size:
    clamp(18px,4vw,34px);

    text-shadow:

    0 0 10px cyan,
    0 0 30px cyan;

    animation:
    pulse 1.5s infinite;
}

@keyframes pulse{

    0%{
        opacity:.4;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.4;
    }
}

/* 摄像头 */

#cameraBox{

    position:absolute;

    right:16px;
    bottom:16px;

    width:145px;
    height:190px;

    overflow:hidden;

    border-radius:26px;

    border:2px solid rgba(255,255,255,.3);

    box-shadow:

    0 0 20px cyan,
    0 0 50px rgba(0,255,255,.45);
}

#video,
#handCanvas{

    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

    transform:scaleX(-1);
}

/* 开始按钮 */

#startBtn{

    position:absolute;

    left:50%;
    bottom:90px;

    transform:
    translateX(-50%);

    border:none;

    padding:
    18px 40px;

    border-radius:999px;

    font-size:24px;

    font-weight:bold;

    color:white;

    background:

    linear-gradient(
    135deg,
    #00ffff,
    #0066ff
    );

    box-shadow:

    0 0 20px cyan,
    0 0 50px cyan;

    pointer-events:auto;
}

/* 子弹时间 */

#slowmo{

    position:absolute;

    inset:0;

    background:
    rgba(255,255,255,.06);

    opacity:0;

    transition:.2s;
}

/* vignette */

#vignette{

    position:absolute;
    inset:0;

    background:

    radial-gradient(
    circle at center,
    transparent 45%,
    rgba(0,0,0,.6)
    );
}

</style>
</head>

<body>

<div id="ui">

    <div id="vignette"></div>

    <div id="slowmo"></div>

    <div id="logo">
        ⚡ 天宇game ⚡
    </div>

    <div id="score">
        得分 0
    </div>

    <div id="combo">
        COMBO x0
    </div>

    <div id="rank">
        RANK：CYBER
    </div>

    <div id="tip">

        ⭐ 切开能量核心开始游戏<br>

        ⚔ 挥动手指释放赛博光剑<br>

        🔥 连击进入子弹时间
    </div>

    <button id="startBtn">
        START GAME
    </button>

    <div id="cameraBox">

        <video
        id="video"
        autoplay
        playsinline
        muted>
        </video>

        <canvas id="handCanvas"></canvas>

    </div>

</div>

<audio
id="bgm"
loop
playsinline>

<source
src="dishimu.mp3"
type="audio/mpeg">

</audio>

<script type="module">

/* =========================
   THREE
========================= */

import * as THREE from
'https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js';

/* POSTPROCESS */

import {
EffectComposer
}
from
'https://cdn.jsdelivr.net/npm/three@0.164/examples/jsm/postprocessing/EffectComposer.js';

import {
RenderPass
}
from
'https://cdn.jsdelivr.net/npm/three@0.164/examples/jsm/postprocessing/RenderPass.js';

import {
UnrealBloomPass
}
from
'https://cdn.jsdelivr.net/npm/three@0.164/examples/jsm/postprocessing/UnrealBloomPass.js';

/* MEDIAPIPE */

import {
HandLandmarker,
FilesetResolver
}
from
'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0';

/* =========================
   场景
========================= */

const scene =
new THREE.Scene();

const camera =
new THREE.PerspectiveCamera(

    70,

    innerWidth/innerHeight,

    .1,

    1000
);

camera.position.z = 18;

/* =========================
   renderer
========================= */

const renderer =
new THREE.WebGLRenderer({

    antialias:false,
    alpha:true
});

renderer.setSize(
    innerWidth,
    innerHeight
);

renderer.setPixelRatio(
    Math.min(
        devicePixelRatio,
        1
    )
);

document.body.appendChild(
    renderer.domElement
);

/* =========================
   Bloom
========================= */

const composer =
new EffectComposer(renderer);

composer.addPass(
new RenderPass(scene,camera)
);

const bloom =
new UnrealBloomPass(

    new THREE.Vector2(
        innerWidth,
        innerHeight
    ),

    1.4,
    1,
    .1
);

composer.addPass(bloom);

/* =========================
   灯光
========================= */

scene.add(
new THREE.AmbientLight(
    0xffffff,
    1.3
));

const light =
new THREE.PointLight(
    0x00ffff,
    8,
    100
);

light.position.set(0,8,10);

scene.add(light);

/* =========================
   星空
========================= */

const starsGeo =
new THREE.BufferGeometry();

const starArr = [];

for(let i=0;i<1500;i++){

    starArr.push(

        (Math.random()-.5)*200,

        (Math.random()-.5)*200,

        (Math.random()-.5)*200
    );
}

starsGeo.setAttribute(

    'position',

    new THREE.Float32BufferAttribute(
        starArr,
        3
    )
);

const stars =
new THREE.Points(

    starsGeo,

    new THREE.PointsMaterial({

        color:0xffffff,

        size:.15
    })
);

scene.add(stars);

/* =========================
   UI
========================= */

const scoreEl =
document.getElementById("score");

const comboEl =
document.getElementById("combo");

const rankEl =
document.getElementById("rank");

const tipEl =
document.getElementById("tip");

const slowmoEl =
document.getElementById("slowmo");

/* =========================
   游戏
========================= */

let score = 0;
let combo = 0;

let gameStarted = false;

let timeScale = 1;

/* =========================
   音乐
========================= */

const bgm =
document.getElementById("bgm");

const audioCtx =
new (window.AudioContext ||
window.webkitAudioContext)();

/* 切割音 */

function slashSound(){

    const osc =
    audioCtx.createOscillator();

    const gain =
    audioCtx.createGain();

    osc.type = "sawtooth";

    osc.frequency.value = 1000;

    gain.gain.value = .08;

    osc.connect(gain);

    gain.connect(
        audioCtx.destination
    );

    osc.start();

    gain.gain.exponentialRampToValueAtTime(

        0.0001,

        audioCtx.currentTime + .1
    );

    osc.stop(
        audioCtx.currentTime + .1
    );
}

/* =========================
   开始核心
========================= */

let core;

function createCore(){

    core =
    new THREE.Mesh(

        new THREE.IcosahedronGeometry(
            2,
            1
        ),

        new THREE.MeshStandardMaterial({

            color:0x00ffff,

            emissive:0x00ffff,

            emissiveIntensity:3
        })
    );

    scene.add(core);
}

createCore();

/* =========================
   水果
========================= */

const fruits = [];

const emojis = [

    "🍉",
    "🍎",
    "🍊",
    "🍓",
    "🍑",
    "🥝"
];

function emojiTexture(emoji){

    const c =
    document.createElement("canvas");

    c.width = 128;
    c.height = 128;

    const ctx =
    c.getContext("2d");

    ctx.font = "90px serif";

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillText(
        emoji,
        64,
        64
    );

    return new THREE.CanvasTexture(c);
}

function spawnFruit(){

    const emoji =
    emojis[
        Math.floor(
            Math.random()*
            emojis.length
        )
    ];

    const fruit =
    new THREE.Mesh(

        new THREE.PlaneGeometry(
            2.5,
            2.5
        ),

        new THREE.MeshBasicMaterial({

            map:
            emojiTexture(emoji),

            transparent:true
        })
    );

    fruit.position.x =
    (Math.random()-.5)*14;

    fruit.position.y = -11;

    fruit.velocity = {

        x:(Math.random()-.5)*.05,

        y:.18 + Math.random()*.04
    };

    fruit.rot =
    (Math.random()-.5)*.08;

    scene.add(fruit);

    fruits.push(fruit);
}

/* =========================
   光剑
========================= */

const swordPoints = [];

const swordGeo =
new THREE.BufferGeometry();

const sword =
new THREE.Line(

    swordGeo,

    new THREE.LineBasicMaterial({

        color:0x00ffff
    })
);

scene.add(sword);

/* 光剑球 */

const glow =
new THREE.Mesh(

    new THREE.SphereGeometry(
        .18,
        12,
        12
    ),

    new THREE.MeshBasicMaterial({

        color:0x00ffff
    })
);

scene.add(glow);

/* 平滑 */

let sx = 0;
let sy = 0;

let lastX = 0;
let lastY = 0;

let swordSpeed = 0;

function updateSword(x,y){

    sx += (x-sx)*0.25;
    sy += (y-sy)*0.25;

    swordSpeed =
    Math.hypot(
        sx-lastX,
        sy-lastY
    );

    lastX = sx;
    lastY = sy;

    glow.position.set(
        sx,
        sy,
        0
    );

    swordPoints.push(

        new THREE.Vector3(
            sx,
            sy,
            0
        )
    );

    if(swordPoints.length > 22){

        swordPoints.shift();
    }

    swordGeo.setFromPoints(
        swordPoints
    );
}

/* =========================
   粒子
========================= */

const particles = [];

function boom(x,y){

    for(let i=0;i<14;i++){

        const p =
        new THREE.Mesh(

            new THREE.SphereGeometry(
                .05,
                4,
                4
            ),

            new THREE.MeshBasicMaterial({

                color:
                Math.random()>.5
                ?0x00ffff
                :0xff00ff,

                transparent:true
            })
        );

        p.position.set(x,y,0);

        p.vel = {

            x:(Math.random()-.5)*.35,

            y:(Math.random()-.5)*.35
        };

        p.life = 1;

        scene.add(p);

        particles.push(p);
    }
}

/* =========================
   子弹时间
========================= */

function activateSlowmo(){

    timeScale = .35;

    slowmoEl.style.opacity = 1;

    setTimeout(()=>{

        timeScale = 1;

        slowmoEl.style.opacity = 0;

    },1200);
}

/* =========================
   camera
========================= */

const video =
document.getElementById("video");

const handCanvas =
document.getElementById("handCanvas");

const hctx =
handCanvas.getContext("2d");

handCanvas.width = 145;
handCanvas.height = 190;

async function setupCamera(){

    const stream =
    await navigator
    .mediaDevices
    .getUserMedia({

        video:{

            facingMode:"user",

            width:{ideal:320},

            height:{ideal:240}
        },

        audio:false
    });

    video.srcObject = stream;

    return new Promise(resolve=>{

        video.onloadedmetadata =
        ()=>resolve(video);
    });
}

/* =========================
   mediapipe
========================= */

let handLandmarker;

async function setupHand(){

    const vision =
    await FilesetResolver
    .forVisionTasks(

        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
    );

    handLandmarker =
    await HandLandmarker
    .createFromOptions(

        vision,

        {

            baseOptions:{

                modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
            },

            runningMode:"VIDEO",

            numHands:1
        }
    );
}

/* =========================
   detect
========================= */

let detectFrame = 0;

async function detectHands(){

    detectFrame++;

    if(detectFrame % 2 === 0){

        const result =
        handLandmarker.detectForVideo(

            video,

            performance.now()
        );

        hctx.clearRect(
            0,
            0,
            handCanvas.width,
            handCanvas.height
        );

        if(result.landmarks.length){

            const lm =
            result.landmarks[0];

            drawHand(lm);

            const finger =
            lm[8];

            const x =
            ((1-finger.x)*2-1)*10;

            const y =
            (-(finger.y*2-1))*6;

            updateSword(x,y);

            checkHit(x,y);
        }
    }

    requestAnimationFrame(
        detectHands
    );
}

/* =========================
   手
========================= */

function drawHand(lm){

    hctx.strokeStyle =
    "#00ffff";

    hctx.lineWidth = 1.5;

    const cons = [

        [0,5],[5,6],[6,7],[7,8]
    ];

    for(const [a,b] of cons){

        const p1 = lm[a];
        const p2 = lm[b];

        hctx.beginPath();

        hctx.moveTo(

            p1.x*
            handCanvas.width,

            p1.y*
            handCanvas.height
        );

        hctx.lineTo(

            p2.x*
            handCanvas.width,

            p2.y*
            handCanvas.height
        );

        hctx.stroke();
    }
}

/* =========================
   hit
========================= */

function checkHit(x,y){

    if(core){

        const d =
        Math.hypot(

            x-core.position.x,

            y-core.position.y
        );

        if(d < 2){

            scene.remove(core);

            core = null;

            gameStarted = true;

            tipEl.style.display =
            "none";
        }
    }

    for(let i=fruits.length-1;i>=0;i--){

        const f = fruits[i];

        const d =
        Math.hypot(

            x-f.position.x,

            y-f.position.y
        );

        /* 速度切割 */

        if(
            d < 1.5 &&
            swordSpeed > .08
        ){

            slashSound();

            boom(
                f.position.x,
                f.position.y
            );

            /* 电影镜头震动 */

            camera.position.x =
            (Math.random()-.5)*.2;

            camera.position.y =
            (Math.random()-.5)*.2;

            scene.remove(f);

            fruits.splice(i,1);

            score += 10;

            combo++;

            scoreEl.innerHTML =
            "得分 " + score;

            comboEl.innerHTML =
            "COMBO x" + combo;

            /* rank */

            if(combo > 20){

                rankEl.innerHTML =
                "RANK：GODLIKE";
            }

            else if(combo > 10){

                rankEl.innerHTML =
                "RANK：LEGEND";
            }

            /* 子弹时间 */

            if(combo > 8){

                activateSlowmo();
            }
        }
    }
}

/* =========================
   animate
========================= */

let timer = 0;

function animate(){

    requestAnimationFrame(
        animate
    );

    /* 星空 */

    stars.rotation.y +=
    .0003 * timeScale;

    /* core */

    if(core){

        core.rotation.x +=
        .01 * timeScale;

        core.rotation.y +=
        .01 * timeScale;

        core.position.y =
        Math.sin(
            Date.now()*.002
        )*.4;
    }

    /* spawn */

    if(gameStarted){

        timer++;

        if(timer > 50*timeScale){

            spawnFruit();

            timer = 0;
        }
    }

    /* fruits */

    for(let i=fruits.length-1;i>=0;i--){

        const f = fruits[i];

        f.position.x +=
        f.velocity.x * timeScale;

        f.position.y +=
        f.velocity.y * timeScale;

        f.velocity.y -=
        .003 * timeScale;

        f.rotation.z +=
        f.rot * timeScale;

        if(f.position.y < -12){

            scene.remove(f);

            fruits.splice(i,1);

            combo = 0;

            comboEl.innerHTML =
            "COMBO x0";
        }
    }

    /* particles */

    for(let i=particles.length-1;i>=0;i--){

        const p = particles[i];

        p.position.x +=
        p.vel.x * timeScale;

        p.position.y +=
        p.vel.y * timeScale;

        p.life -= .04;

        p.material.opacity =
        p.life;

        if(p.life <= 0){

            scene.remove(p);

            particles.splice(i,1);
        }
    }

    /* 镜头恢复 */

    camera.position.x *= .9;
    camera.position.y *= .9;

    composer.render();
}

animate();

/* =========================
   resize
========================= */

addEventListener(
"resize",

()=>{

    camera.aspect =
    innerWidth/innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        innerWidth,
        innerHeight
    );

    composer.setSize(
        innerWidth,
        innerHeight
    );
});

/* =========================
   start
========================= */

(async()=>{

    await setupCamera();

    await setupHand();

    detectHands();

})();

/* =========================
   START BTN
========================= */

document
.getElementById("startBtn")
.addEventListener(

"click",

async()=>{

    await audioCtx.resume();

    try{

        await bgm.play();

    }catch(e){}

    document
    .getElementById("startBtn")
    .style.display =
    "none";
});

</script>

</body>
</html>
