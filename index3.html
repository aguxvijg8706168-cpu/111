<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>天宇game - 赛博光剑切水果</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
}

body{
    overflow:hidden;
    background:#000;
    font-family:
    "Arial",
    "Microsoft YaHei",
    sans-serif;
}

/* =========================
   主Canvas
========================= */

canvas{
    display:block;
}

/* =========================
   UI
========================= */

#ui{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:50;
}

/* LOGO */

#logo{
    position:absolute;
    top:22px;
    left:50%;
    transform:translateX(-50%);
    font-size:clamp(34px,5vw,82px);
    font-weight:900;
    letter-spacing:5px;
    color:#fff;

    text-shadow:
    0 0 8px #00ffff,
    0 0 20px #00ffff,
    0 0 40px #00ffff,
    0 0 80px #00ffff;

    animation:logoFloat 3s ease-in-out infinite;
}

@keyframes logoFloat{
    0%{
        transform:translateX(-50%) translateY(0px);
    }
    50%{
        transform:translateX(-50%) translateY(-5px);
    }
    100%{
        transform:translateX(-50%) translateY(0px);
    }
}

/* 得分 */

#score{
    position:absolute;
    top:30px;
    left:30px;
    font-size:42px;
    color:#fff;
    font-weight:900;

    text-shadow:
    0 0 10px cyan,
    0 0 30px cyan;
}

/* combo */

#combo{
    position:absolute;
    top:95px;
    left:30px;
    font-size:28px;
    color:#ffdd00;
    font-weight:bold;

    text-shadow:
    0 0 10px #ff9900,
    0 0 30px #ff9900;
}

/* 提示 */

#tip{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    color:#fff;
    font-size:30px;
    line-height:1.9;
    text-align:center;

    text-shadow:
    0 0 10px cyan,
    0 0 30px cyan;

    animation:pulse 1.8s infinite;
}

@keyframes pulse{
    0%{opacity:.5;}
    50%{opacity:1;}
    100%{opacity:.5;}
}

/* 摄像头 */

#cameraBox{
    position:absolute;
    right:18px;
    bottom:18px;

    width:260px;
    height:190px;

    border-radius:24px;
    overflow:hidden;

    border:3px solid rgba(255,255,255,.35);

    box-shadow:
    0 0 20px cyan,
    0 0 50px rgba(0,255,255,.45);

    backdrop-filter:blur(8px);
}

#video,
#handCanvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;

    transform:scaleX(-1);
}

/* HUD */

#hud{
    position:absolute;
    bottom:225px;
    right:22px;

    color:#fff;
    font-size:15px;
    opacity:.75;
}

/* 中间电影光 */

#cinematicGlow{
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(0,255,255,.12),
    transparent 55%);

    mix-blend-mode:screen;
}

/* 手机适配 */

@media(max-width:768px){

    #cameraBox{
        width:150px;
        height:110px;
    }

    #score{
        font-size:28px;
    }

    #combo{
        font-size:18px;
        top:70px;
    }

    #tip{
        width:90%;
        font-size:20px;
    }

    #hud{
        bottom:135px;
        font-size:12px;
    }
}

</style>
</head>

<body>

<div id="ui">

    <div id="cinematicGlow"></div>

    <div id="logo">
        ⚡ 天宇game ⚡
    </div>

    <div id="score">得分 0</div>

    <div id="combo">COMBO x0</div>

    <div id="tip">
        ⭐ 切开「能量星球」开始游戏<br>
        ⚔ 用食指挥舞赛博光剑<br>
        🔥 连击越高特效越炸裂
    </div>

    <div id="hud">
        MediaPipe + Three.js + WebAudio
    </div>

    <div id="cameraBox">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="handCanvas"></canvas>
    </div>

</div>

<audio id="bgm" loop>
    <source src="dishimu.mp3" type="audio/mpeg">
</audio>

<script type="module">

/* =========================
   THREE.JS
========================= */

import * as THREE from
'https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js';

/* =========================
   MEDIAPIPE
========================= */

import {
    HandLandmarker,
    FilesetResolver
}
from
'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0';

/* =========================
   场景
========================= */

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0x000000,25,80);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.z = 18;

/* =========================
   渲染器
========================= */

const renderer = new THREE.WebGLRenderer({
    antialias:true,
    alpha:true,
    powerPreference:"high-performance"
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    Math.min(devicePixelRatio,1.5)
);

document.body.appendChild(renderer.domElement);

/* =========================
   灯光
========================= */

const ambient = new THREE.AmbientLight(
    0xffffff,
    1.3
);

scene.add(ambient);

const cyanLight = new THREE.PointLight(
    0x00ffff,
    8,
    100
);

cyanLight.position.set(0,10,10);

scene.add(cyanLight);

const pinkLight = new THREE.PointLight(
    0xff00ff,
    6,
    100
);

pinkLight.position.set(0,-5,15);

scene.add(pinkLight);

/* =========================
   星空
========================= */

const starGeo = new THREE.BufferGeometry();

const starCount = 4000;

const starArr = [];

for(let i=0;i<starCount;i++){

    starArr.push(
        (Math.random()-0.5)*300,
        (Math.random()-0.5)*300,
        (Math.random()-0.5)*300
    );
}

starGeo.setAttribute(
    'position',
    new THREE.Float32BufferAttribute(starArr,3)
);

const starMat = new THREE.PointsMaterial({
    color:0xffffff,
    size:0.12
});

const stars = new THREE.Points(
    starGeo,
    starMat
);

scene.add(stars);

/* =========================
   游戏变量
========================= */

let gameStarted = false;
let score = 0;
let combo = 0;

const scoreEl =
document.getElementById("score");

const comboEl =
document.getElementById("combo");

const tipEl =
document.getElementById("tip");

/* =========================
   WebAudio
========================= */

const audioCtx =
new (window.AudioContext ||
window.webkitAudioContext)();

function sliceSound(){

    const osc =
    audioCtx.createOscillator();

    const gain =
    audioCtx.createGain();

    osc.type = "sawtooth";

    osc.frequency.setValueAtTime(
        900,
        audioCtx.currentTime
    );

    osc.frequency.exponentialRampToValueAtTime(
        80,
        audioCtx.currentTime + .15
    );

    gain.gain.setValueAtTime(
        .18,
        audioCtx.currentTime
    );

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + .15
    );

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + .15);
}

function boomSound(){

    const osc =
    audioCtx.createOscillator();

    const gain =
    audioCtx.createGain();

    osc.type = "triangle";

    osc.frequency.setValueAtTime(
        120,
        audioCtx.currentTime
    );

    gain.gain.setValueAtTime(
        .3,
        audioCtx.currentTime
    );

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + .4
    );

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + .4);
}

/* =========================
   能量星球
========================= */

let startOrb;

function createStartOrb(){

    const geo =
    new THREE.IcosahedronGeometry(2.3,2);

    const mat =
    new THREE.MeshStandardMaterial({

        color:0x00ffff,
        emissive:0x00ffff,
        emissiveIntensity:2.5,

        metalness:1,
        roughness:.1,

        wireframe:false
    });

    startOrb = new THREE.Mesh(
        geo,
        mat
    );

    scene.add(startOrb);
}

createStartOrb();

/* =========================
   Emoji水果
========================= */

const fruits = [];

const emojis = [
    "🍉",
    "🍓",
    "🍊",
    "🍎",
    "🥝",
    "🍑",
    "🍍",
    "🍒"
];

function createEmojiTexture(emoji){

    const c =
    document.createElement("canvas");

    c.width = 256;
    c.height = 256;

    const ctx = c.getContext("2d");

    ctx.font = "180px serif";

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillText(
        emoji,
        128,
        128
    );

    return new THREE.CanvasTexture(c);
}

function spawnFruit(){

    const emoji =
    emojis[
        Math.floor(
            Math.random()*emojis.length
        )
    ];

    const geo =
    new THREE.PlaneGeometry(2.8,2.8);

    const mat =
    new THREE.MeshBasicMaterial({
        map:createEmojiTexture(emoji),
        transparent:true
    });

    const fruit =
    new THREE.Mesh(geo,mat);

    fruit.position.x =
    (Math.random()-0.5)*16;

    fruit.position.y = -12;

    fruit.position.z =
    Math.random()*4-2;

    fruit.velocity = {

        x:(Math.random()-0.5)*0.08,

        y:.22 + Math.random()*0.08
    };

    fruit.rotationSpeed =
    (Math.random()-0.5)*0.12;

    scene.add(fruit);

    fruits.push(fruit);
}

/* =========================
   光剑轨迹（超丝滑）
========================= */

const swordPoints = [];

const maxTrail = 40;

const trailGeo =
new THREE.BufferGeometry();

const trailMat =
new THREE.LineBasicMaterial({

    color:0x00ffff,

    transparent:true,

    opacity:.95
});

const trail =
new THREE.Line(
    trailGeo,
    trailMat
);

scene.add(trail);

/* 光剑发光球 */

const saberGlow =
new THREE.Mesh(

    new THREE.SphereGeometry(.3,16,16),

    new THREE.MeshBasicMaterial({
        color:0x00ffff
    })
);

scene.add(saberGlow);

/* 平滑 */

let smoothX = 0;
let smoothY = 0;

function updateSword(x,y){

    /* 插值平滑 */

    smoothX += (x-smoothX)*0.35;
    smoothY += (y-smoothY)*0.35;

    saberGlow.position.set(
        smoothX,
        smoothY,
        0
    );

    swordPoints.push(
        new THREE.Vector3(
            smoothX,
            smoothY,
            0
        )
    );

    if(swordPoints.length > maxTrail){

        swordPoints.shift();
    }

    trailGeo.setFromPoints(
        swordPoints
    );
}

/* =========================
   粒子爆炸
========================= */

const particlePool = [];

function explosion(x,y){

    for(let i=0;i<35;i++){

        const geo =
        new THREE.SphereGeometry(.06,6,6);

        const mat =
        new THREE.MeshBasicMaterial({

            color:
            Math.random()>.5
            ?0x00ffff
            :0xff00ff,

            transparent:true
        });

        const p =
        new THREE.Mesh(geo,mat);

        p.position.set(x,y,0);

        p.vel = {

            x:(Math.random()-0.5)*0.45,

            y:(Math.random()-0.5)*0.45,

            z:(Math.random()-0.5)*0.45
        };

        p.life = 1;

        scene.add(p);

        particlePool.push(p);
    }
}

/* =========================
   摄像头
========================= */

const video =
document.getElementById("video");

const handCanvas =
document.getElementById("handCanvas");

const hctx =
handCanvas.getContext("2d");

handCanvas.width = 260;
handCanvas.height = 190;

async function setupCamera(){

    const stream =
    await navigator.mediaDevices.getUserMedia({

        video:{
            facingMode:"user",
            width:{ideal:640},
            height:{ideal:480}
        },

        audio:false
    });

    video.srcObject = stream;

    return new Promise(resolve=>{

        video.onloadedmetadata = ()=>{

            resolve(video);
        };
    });
}

/* =========================
   MEDIAPIPE
========================= */

let handLandmarker;

async function createHandLandmarker(){

    const vision =
    await FilesetResolver.forVisionTasks(

        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
    );

    handLandmarker =
    await HandLandmarker.createFromOptions(

        vision,

        {

            baseOptions:{

                modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
            },

            runningMode:"VIDEO",

            numHands:1
        }
    );
}

/* =========================
   手部识别
========================= */

let lastVideoTime = -1;

async function detectHands(){

    if(video.currentTime !== lastVideoTime){

        lastVideoTime = video.currentTime;

        const results =
        handLandmarker.detectForVideo(
            video,
            performance.now()
        );

        hctx.clearRect(
            0,
            0,
            handCanvas.width,
            handCanvas.height
        );

        if(results.landmarks.length){

            const lm =
            results.landmarks[0];

            drawHand(lm);

            const index = lm[8];

            const x =
            ((1-index.x)*2-1)*12;

            const y =
            (-(index.y*2-1))*7;

            updateSword(x,y);

            checkHit(x,y);
        }
    }

    requestAnimationFrame(detectHands);
}

/* =========================
   画手骨骼
========================= */

function drawHand(lm){

    hctx.strokeStyle = "#00ffff";
    hctx.lineWidth = 2;

    const cons = [

        [0,1],[1,2],[2,3],[3,4],
        [0,5],[5,6],[6,7],[7,8],
        [5,9],[9,10],[10,11],[11,12],
        [9,13],[13,14],[14,15],[15,16],
        [13,17],[17,18],[18,19],[19,20],
        [0,17]
    ];

    for(const [a,b] of cons){

        const p1 = lm[a];
        const p2 = lm[b];

        hctx.beginPath();

        hctx.moveTo(
            p1.x*handCanvas.width,
            p1.y*handCanvas.height
        );

        hctx.lineTo(
            p2.x*handCanvas.width,
            p2.y*handCanvas.height
        );

        hctx.stroke();
    }

    for(const p of lm){

        hctx.beginPath();

        hctx.fillStyle = "#ffffff";

        hctx.arc(
            p.x*handCanvas.width,
            p.y*handCanvas.height,
            4,
            0,
            Math.PI*2
        );

        hctx.fill();
    }
}

/* =========================
   碰撞
========================= */

function checkHit(x,y){

    /* 开始 */

    if(startOrb){

        const d =
        Math.hypot(
            x-startOrb.position.x,
            y-startOrb.position.y
        );

        if(d < 2.4){

            scene.remove(startOrb);

            startOrb = null;

            gameStarted = true;

            tipEl.style.display = "none";

            document
            .getElementById("bgm")
            .play();

            boomSound();
        }
    }

    /* 水果 */

    for(let i=fruits.length-1;i>=0;i--){

        const f = fruits[i];

        const d =
        Math.hypot(
            x-f.position.x,
            y-f.position.y
        );

        if(d < 1.5){

            explosion(
                f.position.x,
                f.position.y
            );

            sliceSound();

            scene.remove(f);

            fruits.splice(i,1);

            score += 10;

            combo++;

            scoreEl.innerHTML =
            "得分 " + score;

            comboEl.innerHTML =
            "COMBO x" + combo;
        }
    }
}

/* =========================
   动画
========================= */

let spawnTimer = 0;

function animate(){

    requestAnimationFrame(animate);

    /* 星空 */

    stars.rotation.y += .0005;

    /* 开始星球 */

    if(startOrb){

        startOrb.rotation.x += .01;
        startOrb.rotation.y += .015;

        startOrb.position.y =
        Math.sin(Date.now()*.002)*.7;
    }

    /* 刷水果 */

    if(gameStarted){

        spawnTimer++;

        if(spawnTimer > 35){

            spawnFruit();

            spawnTimer = 0;
        }
    }

    /* 水果 */

    for(let i=fruits.length-1;i>=0;i--){

        const f = fruits[i];

        f.position.x += f.velocity.x;
        f.position.y += f.velocity.y;

        f.velocity.y -= .0045;

        f.rotation.z += f.rotationSpeed;

        if(f.position.y < -15){

            scene.remove(f);

            fruits.splice(i,1);

            combo = 0;

            comboEl.innerHTML =
            "COMBO x0";
        }
    }

    /* 粒子 */

    for(let i=particlePool.length-1;i>=0;i--){

        const p = particlePool[i];

        p.position.x += p.vel.x;
        p.position.y += p.vel.y;
        p.position.z += p.vel.z;

        p.life -= .03;

        p.material.opacity = p.life;

        if(p.life <= 0){

            scene.remove(p);

            particlePool.splice(i,1);
        }
    }

    renderer.render(scene,camera);
}

animate();

/* =========================
   resize
========================= */

window.addEventListener("resize",()=>{

    camera.aspect =
    window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

/* =========================
   初始化
========================= */

(async()=>{

    await setupCamera();

    await createHandLandmarker();

    detectHands();

})();

/* =========================
   手机音频解锁
========================= */

window.addEventListener(

    "click",

    ()=>{

        audioCtx.resume();

        document
        .getElementById("bgm")
        .play();
    },

    {once:true}
);

</script>

</body>
</html>
