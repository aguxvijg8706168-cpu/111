<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no" />

<title>天宇game - 赛博光剑切水果</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
touch-action:none;
user-select:none;
}

html,body{
overflow:hidden;
background:#000;
font-family:
Arial,
"Microsoft YaHei";
}

/* 主canvas */

#game{
position:fixed;
inset:0;
z-index:1;
}

/* 光剑canvas */

#fx{
position:fixed;
inset:0;
z-index:5;
pointer-events:none;
}

/* UI */

#ui{
position:fixed;
inset:0;
z-index:20;
pointer-events:none;
}

/* logo */

#logo{

position:absolute;

top:20px;
left:50%;

transform:translateX(-50%);

font-size:
clamp(38px,7vw,92px);

font-weight:900;

color:white;

letter-spacing:5px;

text-shadow:

0 0 10px cyan,
0 0 25px cyan,
0 0 60px cyan;

animation:
float 3s ease-in-out infinite;
}

@keyframes float{

0%{
transform:
translateX(-50%)
translateY(0px);
}

50%{
transform:
translateX(-50%)
translateY(-6px);
}

100%{
transform:
translateX(-50%)
translateY(0px);
}
}

/* score */

#score{

position:absolute;

left:20px;
top:20px;

font-size:
clamp(28px,6vw,64px);

font-weight:900;

color:white;

text-shadow:

0 0 10px cyan,
0 0 25px cyan;
}

/* combo */

#combo{

position:absolute;

left:20px;
top:90px;

font-size:
clamp(20px,5vw,42px);

font-weight:bold;

color:#ffcc00;

text-shadow:

0 0 10px orange,
0 0 30px orange;
}

/* rank */

#rank{

position:absolute;

left:20px;
top:145px;

font-size:
clamp(18px,4vw,34px);

font-weight:bold;

color:#ff00ff;

text-shadow:

0 0 10px #ff00ff,
0 0 30px #ff00ff;
}

/* 提示 */

#tip{

position:absolute;

left:50%;
top:50%;

transform:
translate(-50%,-50%);

text-align:center;

font-size:
clamp(20px,4vw,36px);

line-height:1.8;

color:white;

text-shadow:

0 0 10px cyan,
0 0 30px cyan;

animation:
pulse 1.5s infinite;
}

@keyframes pulse{

0%{
opacity:.5;
}

50%{
opacity:1;
}

100%{
opacity:.5;
}
}

/* 开始按钮 */

#start{

position:absolute;

left:50%;
bottom:90px;

transform:
translateX(-50%);

padding:
18px 45px;

border:none;

border-radius:999px;

font-size:26px;

font-weight:bold;

color:white;

background:

linear-gradient(
135deg,
#00ffff,
#0066ff
);

box-shadow:

0 0 20px cyan,
0 0 60px cyan;

pointer-events:auto;
}

/* camera */

#camBox{

position:absolute;

right:16px;
bottom:16px;

width:140px;
height:190px;

border-radius:24px;

overflow:hidden;

border:2px solid rgba(255,255,255,.25);

box-shadow:

0 0 20px cyan,
0 0 50px rgba(0,255,255,.5);
}

#video,
#hand{

position:absolute;
inset:0;

width:100%;
height:100%;

object-fit:cover;

transform:scaleX(-1);
}

/* vignette */

#vignette{

position:absolute;
inset:0;

background:

radial-gradient(
circle at center,
transparent 45%,
rgba(0,0,0,.7)
);
}

/* slow */

#slow{

position:absolute;
inset:0;

background:
rgba(255,255,255,.05);

opacity:0;

transition:.2s;
}

</style>
</head>

<body>

<canvas id="game"></canvas>
<canvas id="fx"></canvas>

<div id="ui">

<div id="vignette"></div>
<div id="slow"></div>

<div id="logo">
⚡ 天宇game ⚡
</div>

<div id="score">
得分 0
</div>

<div id="combo">
COMBO x0
</div>

<div id="rank">
RANK : CYBER
</div>

<div id="tip">

⭐ 切开星星开始游戏<br>

⚔ 挥动手指释放赛博光剑<br>

🔥 连击进入子弹时间

</div>

<button id="start">
START GAME
</button>

<div id="camBox">

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="hand"></canvas>

</div>

</div>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<!-- MEDIAPIPE -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>

/* =========================
   基础
========================= */

const game =
document.getElementById("game");

const ctx =
game.getContext("2d");

const fx =
document.getElementById("fx");

const fctx =
fx.getContext("2d");

function resize(){

game.width =
innerWidth;

game.height =
innerHeight;

fx.width =
innerWidth;

fx.height =
innerHeight;
}

resize();

addEventListener(
"resize",
resize
);

/* =========================
   星空
========================= */

const stars = [];

for(let i=0;i<160;i++){

stars.push({

x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
r:Math.random()*2
});
}

/* =========================
   UI
========================= */

const scoreEl =
document.getElementById("score");

const comboEl =
document.getElementById("combo");

const rankEl =
document.getElementById("rank");

const tipEl =
document.getElementById("tip");

const slowEl =
document.getElementById("slow");

/* =========================
   GAME
========================= */

let score = 0;
let combo = 0;

let started = false;

let slowmo = false;

/* =========================
   音乐
========================= */

const audioCtx =
new(window.AudioContext||
window.webkitAudioContext)();

function slashSound(){

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.type = "sawtooth";

osc.frequency.value =
900 + Math.random()*300;

gain.gain.value = .05;

osc.connect(gain);

gain.connect(
audioCtx.destination
);

osc.start();

gain.gain.exponentialRampToValueAtTime(

0.0001,

audioCtx.currentTime + .1
);

osc.stop(
audioCtx.currentTime + .1
);
}

/* =========================
   BGM
========================= */

const bgm =
new Audio("dishimu.mp3");

bgm.loop = true;

bgm.volume = .6;

/* =========================
   水果
========================= */

const fruits = [];

const emojis = [

"🍉",
"🍎",
"🍓",
"🍊",
"🥝",
"🍑"
];

function spawnFruit(){

const fruit = {

x:
Math.random()*innerWidth,

y:
innerHeight + 100,

vx:
(Math.random()-.5)*4,

vy:
-(
15 + Math.random()*6
),

size:
60 + Math.random()*30,

emoji:
emojis[
Math.floor(
Math.random()*
emojis.length
)
],

rot:0,

vr:
(Math.random()-.5)*0.2
};

fruits.push(fruit);
}

/* =========================
   开始星星
========================= */

const startStar = {

x:innerWidth/2,
y:innerHeight/2-100,
size:90,
rot:0
};

/* =========================
   光剑
========================= */

const trail = [];

let fingerX =
innerWidth/2;

let fingerY =
innerHeight/2;

let lastX =
fingerX;

let lastY =
fingerY;

let speed = 0;

/* =========================
   粒子
========================= */

const particles = [];

function boom(x,y){

for(let i=0;i<24;i++){

particles.push({

x,
y,

vx:
(Math.random()-.5)*12,

vy:
(Math.random()-.5)*12,

life:1,

c:
Math.random()>.5
?"cyan"
:"#ff00ff"
});
}
}

/* =========================
   slowmo
========================= */

function activateSlow(){

if(slowmo) return;

slowmo = true;

slowEl.style.opacity = 1;

setTimeout(()=>{

slowmo = false;

slowEl.style.opacity = 0;

},1200);
}

/* =========================
   camera
========================= */

const video =
document.getElementById("video");

const handCanvas =
document.getElementById("hand");

const hctx =
handCanvas.getContext("2d");

handCanvas.width = 140;
handCanvas.height = 190;

/* =========================
   mediapipe
========================= */

const hands =
new Hands({

locateFile:file=>

`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({

maxNumHands:1,

modelComplexity:0,

minDetectionConfidence:.6,

minTrackingConfidence:.5
});

hands.onResults(onResults);

/* =========================
   摄像头
========================= */

async function initCam(){

const stream =
await navigator
.mediaDevices
.getUserMedia({

video:{

facingMode:"user",

width:{ideal:320},

height:{ideal:240}
},

audio:false
});

video.srcObject = stream;

video.onloadedmetadata=()=>{

video.play();

detect();
};
}

/* =========================
   detect
========================= */

async function detect(){

await hands.send({
image:video
});

requestAnimationFrame(
detect
);
}

/* =========================
   手势结果
========================= */

function onResults(results){

hctx.clearRect(
0,0,
handCanvas.width,
handCanvas.height
);

if(results.multiHandLandmarks
&&
results.multiHandLandmarks.length){

const lm =
results.multiHandLandmarks[0];

drawHand(lm);

const finger =
lm[8];

fingerX =
(1-finger.x)*innerWidth;

fingerY =
finger.y*innerHeight;

speed = Math.hypot(

fingerX-lastX,

fingerY-lastY
);

lastX = fingerX;
lastY = fingerY;

trail.push({

x:fingerX,
y:fingerY
});

if(trail.length>18){

trail.shift();
}

checkHit();
}
}

/* =========================
   hand draw
========================= */

function drawHand(lm){

hctx.strokeStyle =
"#00ffff";

hctx.lineWidth = 2;

const lines = [

[0,5],[5,6],[6,7],[7,8]
];

for(const [a,b] of lines){

const p1 = lm[a];
const p2 = lm[b];

hctx.beginPath();

hctx.moveTo(

p1.x*
handCanvas.width,

p1.y*
handCanvas.height
);

hctx.lineTo(

p2.x*
handCanvas.width,

p2.y*
handCanvas.height
);

hctx.stroke();
}
}

/* =========================
   hit
========================= */

function checkHit(){

/* 开始 */

if(!started){

const d =
Math.hypot(

fingerX-startStar.x,

fingerY-startStar.y
);

if(d < 80){

started = true;

tipEl.style.display =
"none";
}
}

/* 切水果 */

for(let i=fruits.length-1;i>=0;i--){

const f = fruits[i];

const d =
Math.hypot(

fingerX-f.x,

fingerY-f.y
);

if(
d < f.size*.5
&&
speed > 22
){

slashSound();

boom(f.x,f.y);

fruits.splice(i,1);

score += 10;

combo++;

scoreEl.innerHTML =
"得分 " + score;

comboEl.innerHTML =
"COMBO x" + combo;

if(combo > 20){

rankEl.innerHTML =
"RANK : GODLIKE";
}

else if(combo > 10){

rankEl.innerHTML =
"RANK : LEGEND";
}

if(combo >= 8){

activateSlow();
}
}
}
}

/* =========================
   draw
========================= */

let spawnTimer = 0;

function draw(){

requestAnimationFrame(draw);

/* 清屏 */

ctx.clearRect(
0,0,
innerWidth,
innerHeight
);

/* 星空 */

for(const s of stars){

ctx.fillStyle =
"white";

ctx.globalAlpha =
Math.random();

ctx.beginPath();

ctx.arc(
s.x,
s.y,
s.r,
0,
Math.PI*2
);

ctx.fill();
}

ctx.globalAlpha = 1;

/* 开始星 */

if(!started){

startStar.rot += .03;

ctx.save();

ctx.translate(
startStar.x,
startStar.y
);

ctx.rotate(
startStar.rot
);

ctx.font =
"90px serif";

ctx.textAlign =
"center";

ctx.fillStyle =
"#00ffff";

ctx.shadowBlur = 40;

ctx.shadowColor =
"cyan";

ctx.fillText(
"⭐",
0,
0
);

ctx.restore();
}

/* spawn */

if(started){

spawnTimer++;

if(spawnTimer > (slowmo?30:50)){

spawnFruit();

spawnTimer = 0;
}
}

/* 水果 */

for(let i=fruits.length-1;i>=0;i--){

const f = fruits[i];

f.x +=
f.vx*(slowmo?.35:1);

f.y +=
f.vy*(slowmo?.35:1);

f.vy +=
0.35*(slowmo?.35:1);

f.rot += f.vr;

ctx.save();

ctx.translate(f.x,f.y);

ctx.rotate(f.rot);

ctx.font =
`${f.size}px serif`;

ctx.textAlign =
"center";

ctx.fillText(
f.emoji,
0,
0
);

ctx.restore();

if(f.y > innerHeight+200){

fruits.splice(i,1);

combo = 0;

comboEl.innerHTML =
"COMBO x0";
}
}

/* 粒子 */

for(let i=particles.length-1;i>=0;i--){

const p = particles[i];

p.x += p.vx;
p.y += p.vy;

p.life -= .03;

ctx.globalAlpha =
p.life;

ctx.fillStyle =
p.c;

ctx.beginPath();

ctx.arc(
p.x,
p.y,
5,
0,
Math.PI*2
);

ctx.fill();

if(p.life<=0){

particles.splice(i,1);
}
}

ctx.globalAlpha = 1;

/* 光剑 */

fctx.clearRect(
0,0,
innerWidth,
innerHeight
);

if(trail.length>1){

for(let i=1;i<trail.length;i++){

const p1 = trail[i-1];
const p2 = trail[i];

const alpha =
i/trail.length;

fctx.strokeStyle =
`rgba(0,255,255,${alpha})`;

fctx.lineWidth =
i*2;

fctx.shadowBlur = 25;

fctx.shadowColor =
"cyan";

fctx.beginPath();

fctx.moveTo(p1.x,p1.y);

fctx.lineTo(p2.x,p2.y);

fctx.stroke();
}
}

/* 核心光点 */

fctx.beginPath();

fctx.fillStyle =
"#00ffff";

fctx.shadowBlur = 30;

fctx.shadowColor =
"cyan";

fctx.arc(

fingerX,
fingerY,

8,
0,
Math.PI*2
);

fctx.fill();
}

draw();

/* =========================
   START
========================= */

document
.getElementById("start")
.onclick = async ()=>{

try{

await audioCtx.resume();

await bgm.play();

}catch(e){}

document
.getElementById("start")
.style.display =
"none";

initCam();
};

</script>

</body>
</html>
